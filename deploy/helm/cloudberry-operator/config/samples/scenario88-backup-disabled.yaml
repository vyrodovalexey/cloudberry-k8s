# =============================================================================
# Scenario 88 — Backup Disabled / No Schedule
# =============================================================================
# A single HA CloudberryCluster used to exercise backup enable/disable and
# empty-schedule behavior:
#   88a — backup.enabled: false  -> no CronJob, no backup Jobs, API reports
#         disabled (enabled:false); re-enable -> CronJob recreated.
#   88b — enabled: true, schedule: "" -> no CronJob, but on-demand backups
#         (API/CLI) still work.
#
# This manifest STARTS with backup ENABLED and a schedule set, so the live
# Scenario 88 script can:
#   - disable it (88a) and assert the CronJob is removed + API reports disabled,
#   - re-enable + schedule (88a) and assert the CronJob is recreated,
#   - set an EMPTY schedule (88b) and assert no CronJob but on-demand works.
#
# Cluster: HA coordinator + standby, segment mirroring (2 primary + 2 mirror),
# TLS from Vault PKI (scenario88-tls), postgres-exporter on coordinator +
# every segment + mirror, cloudberry-query-exporter, S3 (MinIO) backup.
#
# Prereqs (env setup / live script create these):
#   - Secret backup-s3-credentials (MinIO creds) in cloudberry-test
#   - Secret oidc-client-secret in cloudberry-test
#   - Secret scenario88-tls (Vault PKI issued)
#   - ExternalName Service "minio" -> host.docker.internal:9000
# =============================================================================
apiVersion: avsoft.io/v1alpha1
kind: CloudberryCluster
metadata:
  name: scenario88
  namespace: cloudberry-test
  labels:
    app.kubernetes.io/managed-by: cloudberry-operator
    scenario: "88"
spec:
  version: "2.1.0"
  image: "cloudberry-official:2.1.0"
  imagePullPolicy: IfNotPresent

  coordinator:
    replicas: 1
    resources:
      requests:
        cpu: "100m"
        memory: "256Mi"
      limits:
        cpu: "500m"
        memory: "512Mi"
    storage:
      size: "2Gi"

  standby:
    enabled: true
    resources:
      requests:
        cpu: "100m"
        memory: "256Mi"
      limits:
        cpu: "500m"
        memory: "512Mi"
    storage:
      size: "2Gi"

  segments:
    count: 2
    primariesPerHost: 2
    resources:
      requests:
        cpu: "100m"
        memory: "256Mi"
      limits:
        cpu: "500m"
        memory: "512Mi"
    storage:
      size: "2Gi"
    mirroring:
      enabled: true
      layout: group
    antiAffinity: preferred

  auth:
    basic:
      enabled: true
      adminUser: gpadmin
    ssl:
      enabled: true
      certSecret:
        name: scenario88-tls
      minTLSVersion: "1.2"
    oidc:
      enabled: true
      issuerURL: "http://host.docker.internal:8090/realms/test"
      clientID: "cloudberry-operator"
      clientSecret:
        secretRef:
          name: oidc-client-secret
          key: client-secret
      scopes:
        - openid
        - profile
        - email
      roleClaimPath: "realm_access.roles"
      roleClaimSource: id_token
      roleMatchMode: exact
      roleMapping:
        admin: Admin
        user: Basic
        reader: "Self Only"
      pkce: true
      allowLocalSignIn: true
    hbaRules:
      - type: local
        database: all
        user: gpadmin
        method: trust
      - type: host
        database: all
        user: all
        address: "0.0.0.0/0"
        method: scram-sha-256

  ha:
    ftsProbeInterval: 60
    ftsProbeTimeout: 20
    ftsProbeRetries: 5

  vault:
    enabled: true
    address: "http://host.docker.internal:8200"
    authMethod: kubernetes
    authPath: "auth/kubernetes"
    role: "cloudberry-operator"
    secretPath: "secret/data/cloudberry"

  queryMonitoring:
    enabled: true
    guestAccess: false
    historyRetention: "30d"
    samplingInterval: 6
    planCollection: true
    slowQueryThreshold: "1000ms"
    exporters:
      postgresExporter:
        enabled: true
        image: "prometheuscommunity/postgres-exporter:v0.16.0"
        port: 9187
        segments: true
        mirrors: true
      cloudberryQueryExporter:
        enabled: true
        image: "cloudberry-query-exporter:1.0.0"
        port: 9188

  monitoring:
    enabled: true
    metricsPort: 9187
    serviceMonitor: false

  # Backup STARTS enabled with a schedule so the live script can exercise
  # disable (88a), re-enable (88a) and empty-schedule (88b) transitions.
  backup:
    enabled: true
    image: "cloudberry-backup:2.1.0"
    schedule: "0 2 * * *"
    gpbackup:
      compressionType: zstd
      compressionLevel: 1
      jobs: 4
    destination:
      type: s3
      s3:
        endpoint: "http://host.docker.internal:9000"
        region: "us-east-1"
        bucket: "cloudberry-backups"
        folder: "scenario88"
        encryption: "off"
        forcePathStyle: true
        multipart:
          backupMaxConcurrentRequests: 4
          backupMultipartChunksize: "10MB"
          restoreMaxConcurrentRequests: 4
          restoreMultipartChunksize: "10MB"
        credentialSecret:
          name: backup-s3-credentials
          accessKeyField: aws_access_key_id
          secretKeyField: aws_secret_access_key

  deletionPolicy: Delete
