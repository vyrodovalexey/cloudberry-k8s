# =============================================================================
# Scenario 84 — Prometheus Metrics / gpbackup_exporter (S3/MinIO destination)
# =============================================================================
# HA coordinator + standby, segment mirroring (group layout), Vault-PKI TLS,
# Keycloak OIDC, full query monitoring (postgres-exporter on segments + mirrors,
# cloudberry-query-exporter), the operator /metrics endpoint scraped by vmagent
# into VictoriaMetrics, plus an S3 (MinIO) backup destination with INCREMENTAL
# enabled and ALL retention policies set (so the full lifecycle exercises every
# one of the 9 backup-lifecycle metrics).
#
# EXPORTER MODEL
# --------------
# The "gpbackup_exporter" is implemented as the OPERATOR /metrics endpoint: the
# operator derives the 9 backup metrics from the observed backup/restore/cleanup
# Jobs + their avsoft.io annotations (NOT a separate sidecar binary). The
# operator Deployment + Service carry prometheus.io/scrape=true + the /metrics
# path + port; vmagent (kubernetes_sd) scrapes them into VictoriaMetrics.
#
# Scenario 84 verifies the operator records ALL 9 metrics across a full
# lifecycle, and that they land in VictoriaMetrics (namespace label
# cloudberry-test, cluster label scenario84-s3):
#   M1 cloudberry_backup_total{type=full|incremental,result=success}   (>=1 each)
#   M2 cloudberry_backup_duration_seconds_count{type=full|incremental} (>=1 each)
#   M3 cloudberry_backup_size_bytes{timestamp=...}                     (>=1, value>0)
#   M4 cloudberry_backup_last_success_timestamp                        (~ now)
#   M5 cloudberry_backup_last_status                                   (0 ok / 1 fail)
#   M6 cloudberry_restore_total{result=success}                        (>=1)
#   M7 cloudberry_restore_duration_seconds_count                       (>=1)
#   M8 cloudberry_backup_retention_deleted_total                       (>=1)
#   M9 cloudberry_backup_job_status{operation=backup|restore|cleanup}  (2 ok / 3 bad)
#
# NOTE: cloudberry_backup_total / cloudberry_restore_total carry the outcome
# label `result` (success|failed), NOT `status` (the Scenario-84 wording maps to
# `result`). Do NOT rename the label.
#
# The live script (test/e2e/scripts/scenario84-metrics.sh) drives the full
# lifecycle: a REAL FULL gpbackup, a REAL INCREMENTAL gpbackup, a gprestore, a
# gpbackman retention cleanup and a forced failure (all via coordinator-exec),
# materializing operator-shaped Jobs so the operator records the metrics, then
# asserts all 9 in VictoriaMetrics with poll loops.
#
# No schedule is set: Scenario 84 drives on-demand backups/cleanup so each
# operation surfaces on a discrete reconciled Job.
#
# Live test: test/e2e/scripts/scenario84-metrics.sh --cluster scenario84-s3
# =============================================================================
apiVersion: v1
kind: Secret
metadata:
  name: backup-s3-credentials
  namespace: cloudberry-test
  labels:
    app.kubernetes.io/managed-by: cloudberry-operator
    scenario: "84"
type: Opaque
stringData:
  aws_access_key_id: minioadmin
  aws_secret_access_key: minioadmin
---
apiVersion: avsoft.io/v1alpha1
kind: CloudberryCluster
metadata:
  name: scenario84-s3
  namespace: cloudberry-test
  labels:
    app.kubernetes.io/managed-by: cloudberry-operator
    scenario: "84"
spec:
  version: "2.1.0"
  image: "cloudberry-official:2.1.0"
  imagePullPolicy: IfNotPresent

  coordinator:
    replicas: 1
    resources:
      requests:
        cpu: "100m"
        memory: "1Gi"
      limits:
        cpu: "500m"
        memory: "1Gi"
    storage:
      size: "1Gi"

  standby:
    enabled: true
    resources:
      requests:
        cpu: "100m"
        memory: "1Gi"
      limits:
        cpu: "500m"
        memory: "1Gi"
    storage:
      size: "1Gi"

  segments:
    count: 2
    primariesPerHost: 2
    resources:
      requests:
        cpu: "100m"
        memory: "1Gi"
      limits:
        cpu: "500m"
        memory: "1Gi"
    storage:
      size: "2Gi"
    mirroring:
      enabled: true
      layout: group
    antiAffinity: preferred

  auth:
    basic:
      enabled: true
      adminUser: gpadmin
    ssl:
      # TLS certificates issued from Vault PKI (stored in the scenario84-s3-tls secret).
      enabled: true
      certSecret:
        name: scenario84-s3-tls
      minTLSVersion: "1.2"
    oidc:
      enabled: true
      issuerURL: "http://host.docker.internal:8090/realms/test"
      clientID: "cloudberry-operator"
      clientSecret:
        secretRef:
          name: oidc-client-secret
          key: client-secret
      scopes:
        - openid
        - profile
        - email
      roleClaimPath: "realm_access.roles"
      roleClaimSource: id_token
      roleMatchMode: exact
      roleMapping:
        admin: Admin
        user: Basic
        reader: "Self Only"
      pkce: true
      allowLocalSignIn: true
    hbaRules:
      - type: local
        database: all
        user: gpadmin
        method: trust
      - type: host
        database: all
        user: all
        address: "0.0.0.0/0"
        method: scram-sha-256

  ha:
    ftsProbeInterval: 60
    ftsProbeTimeout: 20
    ftsProbeRetries: 5

  vault:
    enabled: true
    address: "http://host.docker.internal:8200"
    authMethod: kubernetes
    authPath: "auth/kubernetes"
    role: "cloudberry-operator"
    secretPath: "secret/data/cloudberry"

  queryMonitoring:
    enabled: true
    guestAccess: false
    historyRetention: "30d"
    samplingInterval: 6
    planCollection: true
    slowQueryThreshold: "1000ms"
    exporters:
      postgresExporter:
        enabled: true
        image: "prometheuscommunity/postgres-exporter:v0.16.0"
        port: 9187
        segments: true
        mirrors: true
      cloudberryQueryExporter:
        enabled: true
        image: "cloudberry-query-exporter:1.0.0"
        port: 9188

  monitoring:
    enabled: true
    metricsPort: 9187
    serviceMonitor: false

  # Full backup block — S3 (MinIO) destination with INCREMENTAL enabled and ALL
  # retention policies set. No schedule: Scenario 84 drives on-demand backups +
  # cleanup so each operation surfaces on a discrete reconciled Job that the
  # operator observes to record the 9 metrics.
  backup:
    enabled: true
    image: "cloudberry-backup:2.1.0"            # ships gpbackman for cleanup (M8)
    retention:
      fullCount: 3                              # exercises M8 (retention cleanup)
      incrementalCount: 10
      maxAge: "30d"
    gpbackup:
      incremental: true                         # exercises M1/M2 incremental
      leafPartitionData: true
      compressionType: gzip
      compressionLevel: 1
      jobs: 1
    destination:
      type: s3
      s3:
        endpoint: "http://host.docker.internal:9000"
        region: "us-east-1"
        bucket: "cloudberry-backups"
        folder: "scenario84"                    # SAME folder full+incr (one history)
        encryption: "on"
        forcePathStyle: true
        multipart:
          backupMaxConcurrentRequests: 4
          backupMultipartChunksize: "10MB"
          restoreMaxConcurrentRequests: 4
          restoreMultipartChunksize: "10MB"
        credentialSecret:
          name: backup-s3-credentials
          accessKeyField: aws_access_key_id
          secretKeyField: aws_secret_access_key

  deletionPolicy: Delete
