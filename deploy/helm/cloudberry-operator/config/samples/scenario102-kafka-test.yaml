# =============================================================================
# Scenario 102 — kafka-cdc: Continuous Streaming via a Custom Connector
# =============================================================================
# Full cluster (modeled on scenario93-acceptance-test.yaml) that exercises the
# kafka custom-connector / continuous-streaming data-loading path:
#   - DB image cloudberry-official-pxf:2.1.0 (pxf + pxf_fdw extensions)
#   - HA coordinator with standby
#   - 2 segments with mirroring (group layout)
#   - Vault PKI TLS (auth.ssl) + Vault k8s auth + OIDC
#   - Query monitoring: postgres-exporter on segments+mirrors
#     + cloudberry-query-exporter
#   - deletionPolicy Retain
#   - PXF sidecar (cloudberry-pxf:2.1.0) with extensions pxf+pxf_fdw
#   - dataLoading.pxf.customConnectors: the kafka-connector JAR (staged in MinIO)
#   - dataLoading.pxf.servers: a kafka-connector server of type=custom (W.3+W.24)
#   - dataLoading.jobs: the kafka-cdc job (type pxf, NO schedule, continuous) —
#     a one-off long-running streaming consumer Job (NOT a CronJob, J.46) that
#     creates a pxf://cloudberry-cdc?PROFILE=kafka&SERVER=kafka-connector external
#     table and streams into public.kafka_events (batchSize 10000, flush 30s).
#
# HONESTY: the connector JAR download + mount is provable with ANY reachable
# artifact at the jarUrl; the end-to-end kafka->table row landing needs a REAL
# Kafka->PXF connector JAR and is CONFIG-ONLY if only a placeholder is staged.
# A continuous consumer's steady state is cloudberry_data_loading_job_status=
# Running; NO new metric is introduced for kafka-cdc.
# =============================================================================
apiVersion: avsoft.io/v1alpha1
kind: CloudberryCluster
metadata:
  name: kafka-test
  namespace: cloudberry-test
  labels:
    app.kubernetes.io/managed-by: cloudberry-operator
    scenario: "102"
spec:
  version: "2.1.0"
  image: "cloudberry-official-pxf:2.1.0"
  imagePullPolicy: IfNotPresent

  coordinator:
    replicas: 1
    resources:
      requests:
        cpu: "100m"
        memory: "256Mi"
      limits:
        cpu: "500m"
        memory: "512Mi"
    storage:
      size: "2Gi"

  standby:
    enabled: true
    resources:
      requests:
        cpu: "100m"
        memory: "256Mi"
      limits:
        cpu: "500m"
        memory: "512Mi"
    storage:
      size: "2Gi"

  segments:
    count: 2
    primariesPerHost: 2
    resources:
      requests:
        cpu: "100m"
        memory: "256Mi"
      limits:
        cpu: "500m"
        memory: "512Mi"
    storage:
      size: "2Gi"
    mirroring:
      enabled: true
      layout: group
    antiAffinity: preferred

  auth:
    basic:
      enabled: true
      adminUser: gpadmin
    ssl:
      enabled: true
      certSecret:
        name: kafka-test-tls
      minTLSVersion: "1.2"
    oidc:
      enabled: true
      issuerURL: "http://host.docker.internal:8090/realms/test"
      clientID: "cloudberry-operator"
      clientSecret:
        secretRef:
          name: oidc-client-secret
          key: client-secret
      scopes:
        - openid
        - profile
        - email
      roleClaimPath: "realm_access.roles"
      roleClaimSource: id_token
      roleMatchMode: exact
      roleMapping:
        admin: Admin
        user: Basic
        reader: "Self Only"
      pkce: true
      allowLocalSignIn: true
    hbaRules:
      - type: local
        database: all
        user: gpadmin
        method: trust
      - type: host
        database: all
        user: all
        address: "0.0.0.0/0"
        method: scram-sha-256

  ha:
    ftsProbeInterval: 60
    ftsProbeTimeout: 20
    ftsProbeRetries: 5

  vault:
    enabled: true
    address: "http://host.docker.internal:8200"
    authMethod: kubernetes
    authPath: "auth/kubernetes"
    role: "cloudberry-operator"
    secretPath: "secret/data/cloudberry"

  queryMonitoring:
    enabled: true
    guestAccess: false
    historyRetention: "30d"
    samplingInterval: 6
    planCollection: true
    slowQueryThreshold: "1000ms"
    exporters:
      postgresExporter:
        enabled: true
        image: "prometheuscommunity/postgres-exporter:v0.16.0"
        port: 9187
        segments: true
        mirrors: true
      cloudberryQueryExporter:
        enabled: true
        image: "cloudberry-query-exporter:1.0.0"
        port: 9188

  monitoring:
    enabled: true
    metricsPort: 9187
    serviceMonitor: false

  dataLoading:
    enabled: true
    pxf:
      enabled: true
      image: "cloudberry-pxf:2.1.0"
      jvmOpts: "-Xmx1g -Xms256m"
      port: 5888
      logLevel: INFO
      extensions:
        pxf: true
        pxfFdw: true
      # The custom connector JAR implementing the kafka profile. The operator's
      # pxf-connector-init init container downloads it into
      # /pxf/lib/custom/kafka-connector.jar in the PXF sidecar (C.18).
      customConnectors:
        - name: kafka-connector
          jarUrl: "http://minio:9000/cloudberry-data/connectors/kafka-connector.jar"
      servers:
        # The kafka-connector server of type=custom — referenced by the kafka-cdc
        # job; backed by the matching customConnectors[] entry of the same name
        # (W.3 custom + W.24 cross-ref). This is the KEY server for Scenario 102.
        - name: kafka-connector
          type: custom
        # A normal s3 server kept for completeness (not used by kafka-cdc).
        - name: s3-datalake
          type: s3
          config:
            fs.s3a.endpoint: "http://minio:9000"
            fs.s3a.path.style.access: "true"
          credentialSecrets:
            - name: backup-s3-credentials
              key: aws_access_key_id
            - name: backup-s3-credentials
              key: aws_secret_access_key
      resources:
        requests:
          cpu: "100m"
          memory: "256Mi"
        limits:
          cpu: "500m"
          memory: "1Gi"
    jobs:
      # The kafka-cdc continuous streaming job. NO schedule => a one-off
      # long-running Job (NOT a CronJob, J.46). continuous:true shapes the Job
      # with no short deadline; batchSize/flushInterval drive the consume loop
      # (CBK_BATCH_SIZE / CBK_FLUSH_INTERVAL).
      - name: kafka-cdc
        type: pxf
        enabled: true
        pxfJob:
          server: kafka-connector
          profile: "kafka"
          resource: "cloudberry-cdc"
          targetTable: "public.kafka_events"
          continuous: true
          batchSize: 10000
          flushInterval: "30s"

  # Backup S3 destination — provides the S3 credentials + endpoint for the
  # pxf-connector-init init container to download the custom connector JAR
  # from MinIO (s3://cloudberry-data/connectors/kafka-connector.jar).
  backup:
    destination:
      type: s3
      s3:
        bucket: cloudberry-data
        endpoint: "http://minio:9000"
        region: "us-east-1"
        credentialSecret:
          name: backup-s3-credentials
          accessKeyField: aws_access_key_id
          secretKeyField: aws_secret_access_key

  deletionPolicy: Retain
