{{- if .Values.webhook.enabled -}}
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingWebhookConfiguration
metadata:
  name: {{ include "cloudberry-operator.fullname" . }}-validating
  labels:
    {{- include "cloudberry-operator.labels" . | nindent 4 }}
webhooks:
  - name: validate.cloudberrycluster.avsoft.io
    admissionReviewVersions:
      - v1
    clientConfig:
      service:
        name: {{ include "cloudberry-operator.webhookServiceName" . }}
        namespace: {{ .Release.Namespace }}
        path: /validate-avsoft-io-v1alpha1-cloudberrycluster
    failurePolicy: {{ .Values.webhook.failurePolicy }}
    rules:
      - apiGroups:
          - avsoft.io
        apiVersions:
          - v1alpha1
        operations:
          - CREATE
          - UPDATE
        resources:
          - cloudberryclusters
    sideEffects: None
---
apiVersion: admissionregistration.k8s.io/v1
kind: MutatingWebhookConfiguration
metadata:
  name: {{ include "cloudberry-operator.fullname" . }}-mutating
  labels:
    {{- include "cloudberry-operator.labels" . | nindent 4 }}
webhooks:
  - name: mutate.cloudberrycluster.avsoft.io
    admissionReviewVersions:
      - v1
    clientConfig:
      service:
        name: {{ include "cloudberry-operator.webhookServiceName" . }}
        namespace: {{ .Release.Namespace }}
        path: /mutate-avsoft-io-v1alpha1-cloudberrycluster
    failurePolicy: {{ .Values.webhook.failurePolicy }}
    rules:
      - apiGroups:
          - avsoft.io
        apiVersions:
          - v1alpha1
        operations:
          - CREATE
          - UPDATE
        resources:
          - cloudberryclusters
    sideEffects: None
{{- end }}
