{{- if .Values.backup.rbac.create -}}
# ServiceAccount, Role and RoleBinding used by backup/restore Jobs.
# The ServiceAccount name MUST match internal/util/names.go
# BackupServiceAccountName ("cloudberry-backup-sa") so the Job builder can
# reference it.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: cloudberry-backup-sa
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "cloudberry-operator.labels" . | nindent 4 }}
    app.kubernetes.io/component: backup
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: cloudberry-backup-role
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "cloudberry-operator.labels" . | nindent 4 }}
    app.kubernetes.io/component: backup
rules:
  # Secret get permission. When backup.rbac.scopeSecrets is enabled and a
  # secretNames allow-list is provided, the rule is scoped to those
  # resourceNames so the SA cannot read unrelated Secrets. Otherwise the
  # permission stays namespace-wide for backwards compatibility (the
  # credential Secret name is dynamic per-cluster).
  - apiGroups:
      - ""
    resources:
      - secrets
    verbs:
      - get
    {{- if and .Values.backup.rbac.scopeSecrets .Values.backup.rbac.secretNames }}
    resourceNames:
      {{- range .Values.backup.rbac.secretNames }}
      - {{ . | quote }}
      {{- end }}
    {{- end }}
  - apiGroups:
      - ""
    resources:
      - configmaps
    verbs:
      - get
  - apiGroups:
      - ""
    resources:
      - events
    verbs:
      - create
      - patch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: cloudberry-backup-rolebinding
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "cloudberry-operator.labels" . | nindent 4 }}
    app.kubernetes.io/component: backup
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: cloudberry-backup-role
subjects:
  - kind: ServiceAccount
    name: cloudberry-backup-sa
    namespace: {{ .Release.Namespace }}
{{- end }}
