apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "cloudberry-operator.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "cloudberry-operator.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "cloudberry-operator.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        {{- if .Values.metrics.enabled }}
        prometheus.io/scrape: "true"
        prometheus.io/port: {{ .Values.metrics.port | quote }}
        prometheus.io/path: "/metrics"
        {{- end }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "cloudberry-operator.labels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "cloudberry-operator.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: operator
          image: {{ include "cloudberry-operator.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          env:
            - name: CLOUDBERRY_CONFIG_FILE
              value: /etc/cloudberry/config.yaml
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            {{- if .Values.vault.enabled }}
            - name: CLOUDBERRY_VAULT_ENABLED
              value: "true"
            - name: CLOUDBERRY_VAULT_ADDRESS
              value: {{ .Values.vault.address | quote }}
            - name: CLOUDBERRY_VAULT_AUTH_METHOD
              value: {{ .Values.vault.authMethod | quote }}
            - name: CLOUDBERRY_VAULT_AUTH_PATH
              value: {{ .Values.vault.authPath | quote }}
            - name: CLOUDBERRY_VAULT_ROLE
              value: {{ .Values.vault.role | quote }}
            - name: CLOUDBERRY_VAULT_SECRET_PATH
              value: {{ .Values.vault.secretPath | quote }}
            {{- if and (eq .Values.vault.authMethod "token") .Values.vault.token }}
            - name: CLOUDBERRY_VAULT_TOKEN
              value: {{ .Values.vault.token | quote }}
            {{- end }}
            {{- end }}
            {{- if and .Values.oidc.enabled (or .Values.oidc.existingSecret .Values.oidc.clientSecret) }}
            - name: CLOUDBERRY_OIDC_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "cloudberry-operator.oidcSecretName" . }}
                  key: {{ .Values.oidc.existingSecretKey | default "client-secret" }}
            {{- end }}
            {{- if .Values.telemetry.enabled }}
            - name: CLOUDBERRY_TELEMETRY_ENABLED
              value: "true"
            - name: CLOUDBERRY_TELEMETRY_OTLP_ENDPOINT
              value: {{ .Values.telemetry.otlpEndpoint | quote }}
            - name: CLOUDBERRY_TELEMETRY_OTLP_PROTOCOL
              value: {{ .Values.telemetry.otlpProtocol | quote }}
            - name: CLOUDBERRY_TELEMETRY_OTLP_INSECURE
              value: {{ .Values.telemetry.otlpInsecure | quote }}
            - name: CLOUDBERRY_TELEMETRY_SAMPLING_RATE
              value: {{ .Values.telemetry.samplingRate | quote }}
            - name: CLOUDBERRY_TELEMETRY_SERVICE_NAME
              value: {{ .Values.telemetry.serviceName | quote }}
            {{- end }}
            {{- if .Values.webhook.enabled }}
            - name: CLOUDBERRY_WEBHOOK_ENABLED
              value: "true"
            - name: CLOUDBERRY_WEBHOOK_CERT_SOURCE
              value: {{ .Values.webhook.certSource | quote }}
            - name: CLOUDBERRY_WEBHOOK_CERT_SECRET_NAME
              value: {{ include "cloudberry-operator.webhookCertSecretName" . }}
            - name: CLOUDBERRY_WEBHOOK_SERVICE_NAME
              value: {{ include "cloudberry-operator.webhookServiceName" . }}
            {{- if eq .Values.webhook.certSource "vault-pki" }}
            - name: CLOUDBERRY_WEBHOOK_VAULT_PKI_MOUNT
              value: {{ .Values.webhook.vaultPKI.mountPath | default .Values.vault.pkiMountPath | quote }}
            - name: CLOUDBERRY_WEBHOOK_VAULT_PKI_ROLE
              value: {{ .Values.webhook.vaultPKI.role | default .Values.vault.pkiRole | quote }}
            {{- end }}
            {{- end }}
            {{- with .Values.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          ports:
            - name: metrics
              containerPort: {{ .Values.metrics.port }}
              protocol: TCP
            - name: health
              containerPort: 8081
              protocol: TCP
            {{- if .Values.webhook.enabled }}
            - name: webhook
              containerPort: {{ .Values.operator.webhookPort }}
              protocol: TCP
            {{- end }}
          livenessProbe:
            {{- toYaml .Values.livenessProbe | nindent 12 }}
          readinessProbe:
            {{- toYaml .Values.readinessProbe | nindent 12 }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: config
              mountPath: /etc/cloudberry
              readOnly: true
            {{- if .Values.webhook.enabled }}
            - name: webhook-certs
              mountPath: /tmp/k8s-webhook-server/serving-certs
              readOnly: true
            {{- end }}
            {{- with .Values.extraVolumeMounts }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
      volumes:
        - name: config
          configMap:
            name: {{ include "cloudberry-operator.configMapName" . }}
        {{- if .Values.webhook.enabled }}
        - name: webhook-certs
          secret:
            secretName: {{ include "cloudberry-operator.webhookCertSecretName" . }}
            optional: true
        {{- end }}
        {{- with .Values.extraVolumes }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      terminationGracePeriodSeconds: 30
