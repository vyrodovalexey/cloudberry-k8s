                      type: string
                    status:
                      description: Status is the segment status description.
                      type: string
                  required:
                  - contentID
                  - hostname
                  - role
                  - status
                  type: object
                type: array
              lastBackupJobName:
                description: LastBackupJobName is the name of the Job that produced
