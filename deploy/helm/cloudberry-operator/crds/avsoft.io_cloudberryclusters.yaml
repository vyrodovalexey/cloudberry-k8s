              dataLoading:
                description: |-
                  DataLoading is the lightweight data loading status (counts, phase, and
                  per-job name/enabled). The rich per-server/per-job runtime status from
                  specifications/12-data-loading-spec.md is Planned/Future.
                properties:
                  activeJobs:
