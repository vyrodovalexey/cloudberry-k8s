                description: LastReconcileTime is the timestamp of the last reconciliation.
                format: date-time
                type: string
              mirroringStatus:
                description: MirroringStatus is the current mirroring state.
                type: string
              observedGeneration:
                description: ObservedGeneration is the most recent generation observed.
                format: int64
                type: integer
              phase:
                description: Phase is the current cluster phase.
                type: string
              queuedQueries:
                description: QueuedQueries is the number of currently queued queries.
                format: int32
                type: integer
              recommendationCount:
                description: RecommendationCount is the number of active recommendations.
                format: int32
                type: integer
              segmentsReady:
                description: SegmentsReady is the number of ready segments.
                format: int32
                type: integer
              segmentsTotal:
                description: SegmentsTotal is the total number of segments.
                format: int32
                type: integer
              standbyReady:
                description: StandbyReady indicates whether the standby coordinator
                  is ready.
                type: boolean
            type: object
        type: object
