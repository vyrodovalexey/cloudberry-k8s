apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: cloudberryclusters.avsoft.io
  labels:
    app.kubernetes.io/part-of: cloudberry-operator
  annotations:
    controller-gen.kubebuilder.io/version: v0.17.3
spec:
  group: avsoft.io
  names:
    kind: CloudberryCluster
    listKind: CloudberryClusterList
    plural: cloudberryclusters
    singular: cloudberrycluster
    shortNames:
      - cbc
      - cbcluster
    categories:
      - cloudberry
      - database
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      additionalPrinterColumns:
        - name: Phase
          type: string
          jsonPath: .status.phase
        - name: Version
          type: string
          jsonPath: .spec.version
        - name: Segments
          type: integer
          jsonPath: .status.segmentsReady
        - name: Mirroring
          type: string
          jsonPath: .status.mirroringStatus
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
      subresources:
        status: {}
      schema:
        openAPIV3Schema:
          description: CloudberryCluster is the Schema for the cloudberryclusters API.
          type: object
          properties:
            apiVersion:
              type: string
            kind:
              type: string
            metadata:
              type: object
            spec:
              description: CloudberryClusterSpec defines the desired state of CloudberryCluster.
              type: object
              required:
                - coordinator
                - segments
              properties:
                version:
                  description: Version is the Cloudberry DB version.
                  type: string
                  default: "7.7"
                image:
                  description: Image is the container image for Cloudberry DB.
                  type: string
                  default: "cloudberrydb/cloudberry:7.7"
                imagePullPolicy:
                  description: ImagePullPolicy defines when to pull the container image.
                  type: string
                  enum:
                    - Always
                    - IfNotPresent
                    - Never
                  default: IfNotPresent
                imagePullSecrets:
                  description: ImagePullSecrets is a list of references to secrets for pulling images.
                  type: array
                  items:
                    type: object
                    required:
                      - name
                    properties:
                      name:
                        type: string
                coordinator:
                  description: Coordinator defines the coordinator node configuration.
                  type: object
                  required:
                    - storage
                  properties:
                    replicas:
                      type: integer
                      minimum: 1
                      maximum: 1
                      default: 1
                    resources:
                      type: object
                      properties:
                        requests:
                          type: object
                          properties:
                            cpu:
                              type: string
                            memory:
                              type: string
                        limits:
                          type: object
                          properties:
                            cpu:
                              type: string
                            memory:
                              type: string
                    storage:
                      type: object
                      properties:
                        storageClass:
                          type: string
                        size:
                          type: string
                          default: "10Gi"
                    nodeSelector:
                      type: object
                      additionalProperties:
                        type: string
                    tolerations:
                      type: array
                      items:
                        type: object
                        properties:
                          key:
                            type: string
                          operator:
                            type: string
                          value:
                            type: string
                          effect:
                            type: string
                          tolerationSeconds:
                            type: integer
                            format: int64
                    port:
                      type: integer
                      format: int32
                      default: 5432
                standby:
                  description: Standby defines the standby coordinator configuration.
                  type: object
                  properties:
                    enabled:
                      type: boolean
                      default: false
                    resources:
                      type: object
                      properties:
                        requests:
                          type: object
                          properties:
                            cpu:
                              type: string
                            memory:
                              type: string
                        limits:
                          type: object
                          properties:
                            cpu:
                              type: string
                            memory:
                              type: string
                    storage:
                      type: object
                      properties:
                        storageClass:
                          type: string
                        size:
                          type: string
                    nodeSelector:
                      type: object
                      additionalProperties:
                        type: string
                segments:
                  description: Segments defines the segment nodes configuration.
                  type: object
                  required:
                    - count
                    - storage
                  properties:
                    count:
                      type: integer
                      minimum: 1
                    primariesPerHost:
                      type: integer
                      minimum: 1
                      default: 2
                    mirroring:
                      type: object
                      properties:
                        enabled:
                          type: boolean
                          default: true
                        layout:
                          type: string
                          enum:
                            - group
                            - spread
                          default: group
                    resources:
                      type: object
                      properties:
                        requests:
                          type: object
                          properties:
                            cpu:
                              type: string
                            memory:
                              type: string
                        limits:
                          type: object
                          properties:
                            cpu:
                              type: string
                            memory:
                              type: string
                    storage:
                      type: object
                      properties:
                        storageClass:
                          type: string
                        size:
                          type: string
                          default: "10Gi"
                    nodeSelector:
                      type: object
                      additionalProperties:
                        type: string
                    tolerations:
                      type: array
                      items:
                        type: object
                        properties:
                          key:
                            type: string
                          operator:
                            type: string
                          value:
                            type: string
                          effect:
                            type: string
                          tolerationSeconds:
                            type: integer
                            format: int64
                    antiAffinity:
                      type: string
                      enum:
                        - preferred
                        - required
                      default: preferred
                auth:
                  description: Auth defines authentication and authorization configuration.
                  type: object
                  properties:
                    basic:
                      type: object
                      properties:
                        enabled:
                          type: boolean
                          default: true
                        adminUser:
                          type: string
                          default: gpadmin
                        adminPasswordSecret:
                          type: object
                          required:
                            - name
                            - key
                          properties:
                            name:
                              type: string
                            key:
                              type: string
                    oidc:
                      type: object
                      properties:
                        enabled:
                          type: boolean
                          default: false
                        issuerURL:
                          type: string
                        clientID:
                          type: string
                        clientSecret:
                          type: object
                          properties:
                            secretRef:
                              type: object
                              properties:
                                name:
                                  type: string
                                key:
                                  type: string
                        scopes:
                          type: array
                          items:
                            type: string
                        roleClaimPath:
                          type: string
                          default: "realm_access.roles"
                        roleClaimSource:
                          type: string
                          enum:
                            - id_token
                            - userinfo
                          default: id_token
                        roleMatchMode:
                          type: string
                          enum:
                            - exact
                            - suffix
                            - prefix
                            - contains
                          default: exact
                        roleMapping:
                          type: object
                          additionalProperties:
                            type: string
                        pkce:
                          type: boolean
                          default: true
                        allowLocalSignIn:
                          type: boolean
                          default: true
                    hbaRules:
                      type: array
                      items:
                        type: object
                        required:
                          - type
                          - database
                          - user
                          - method
                        properties:
                          type:
                            type: string
                            enum:
                              - local
                              - host
                              - hostssl
                              - hostnossl
                          database:
                            type: string
                          user:
                            type: string
                          address:
                            type: string
                          method:
                            type: string
                          options:
                            type: string
                    ssl:
                      type: object
                      properties:
                        enabled:
                          type: boolean
                          default: false
                        certSecret:
                          type: object
                          properties:
                            name:
                              type: string
                        minTLSVersion:
                          type: string
                          enum:
                            - "1.2"
                            - "1.3"
                          default: "1.2"
                config:
                  description: Config defines cluster configuration parameters.
                  type: object
                  properties:
                    parameters:
                      type: object
                      additionalProperties:
                        type: string
                    coordinatorParameters:
                      type: object
                      additionalProperties:
                        type: string
                    databaseParameters:
                      type: object
                      additionalProperties:
                        type: object
                        additionalProperties:
                          type: string
                    roleParameters:
                      type: object
                      additionalProperties:
                        type: object
                        additionalProperties:
                          type: string
                ha:
                  description: HA defines high availability configuration.
                  type: object
                  properties:
                    ftsProbeInterval:
                      type: integer
                      format: int32
                      default: 60
                    ftsProbeTimeout:
                      type: integer
                      format: int32
                      default: 20
                    ftsProbeRetries:
                      type: integer
                      format: int32
                      default: 5
                    checksums:
                      type: boolean
                      default: true
                vault:
                  description: Vault defines HashiCorp Vault integration configuration.
                  type: object
                  properties:
                    enabled:
                      type: boolean
                      default: false
                    address:
                      type: string
                    authMethod:
                      type: string
                      enum:
                        - token
                        - kubernetes
                        - approle
                      default: kubernetes
                    authPath:
                      type: string
                    role:
                      type: string
                    secretPath:
                      type: string
                    tlsSecret:
                      type: object
                      properties:
                        name:
                          type: string
                monitoring:
                  description: Monitoring defines monitoring configuration.
                  type: object
                  properties:
                    enabled:
                      type: boolean
                      default: true
                    metricsPort:
                      type: integer
                      format: int32
                      default: 9187
                    serviceMonitor:
                      type: boolean
                      default: false
                telemetry:
                  description: Telemetry defines OTLP telemetry configuration.
                  type: object
                  properties:
                    enabled:
                      type: boolean
                      default: false
                    otlpEndpoint:
                      type: string
                    otlpProtocol:
                      type: string
                      enum:
                        - grpc
                        - http
                      default: grpc
                    samplingRate:
                      type: number
                      default: 1
                workload:
                  description: Workload defines workload management configuration.
                  type: object
                  properties:
                    enabled:
                      type: boolean
                      default: false
                    resourceGroups:
                      type: array
                      items:
                        type: object
                        required:
                          - name
                        properties:
                          name:
                            type: string
                          concurrency:
                            type: integer
                            format: int32
                          cpuMaxPercent:
                            type: integer
                            format: int32
                          cpuWeight:
                            type: integer
                            format: int32
                          memoryLimit:
                            type: integer
                            format: int32
                          minCost:
                            type: integer
                            format: int32
                    rules:
                      type: array
                      items:
                        type: object
                        required:
                          - name
                          - action
                        properties:
                          name:
                            type: string
                          enabled:
                            type: boolean
                            default: true
                          resourceGroup:
                            type: string
                          queryTag:
                            type: string
                          role:
                            type: string
                          action:
                            type: string
                            enum:
                              - cancel
                              - move
                              - log
                          moveTarget:
                            type: string
                          threshold:
                            type: string
                          thresholdType:
                            type: string
                          priority:
                            type: integer
                            format: int32
                    idleRules:
                      type: array
                      items:
                        type: object
                        required:
                          - name
                          - resourceGroup
                          - idleTimeout
                        properties:
                          name:
                            type: string
                          enabled:
                            type: boolean
                            default: true
                          resourceGroup:
                            type: string
                          idleTimeout:
                            type: string
                          excludeInTransaction:
                            type: boolean
                            default: false
                          terminateMessage:
                            type: string
                queryMonitoring:
                  description: QueryMonitoring defines query monitoring and analysis configuration.
                  type: object
                  properties:
                    enabled:
                      type: boolean
                      default: false
                    historyRetention:
                      type: string
                    samplingInterval:
                      type: integer
                      format: int32
                    guestAccess:
                      type: boolean
                      default: false
                    planCollection:
                      type: boolean
                      default: false
                    slowQueryThreshold:
                      type: string
                backup:
                  description: Backup defines backup and restore configuration.
                  type: object
                  properties:
                    enabled:
                      type: boolean
                      default: false
                    schedule:
                      type: string
                    retention:
                      type: object
                      properties:
                        fullCount:
                          type: integer
                          format: int32
                        incrementalCount:
                          type: integer
                          format: int32
                        maxAge:
                          type: string
                    destination:
                      type: object
                      required:
                        - type
                      properties:
                        type:
                          type: string
                          enum:
                            - s3
                            - local
                        bucket:
                          type: string
                        endpoint:
                          type: string
                        region:
                          type: string
                        path:
                          type: string
                        credentialSecret:
                          type: object
                          required:
                            - name
                          properties:
                            name:
                              type: string
                            key:
                              type: string
                        forcePathStyle:
                          type: boolean
                          default: false
                    compression:
                      type: integer
                      format: int32
                      minimum: 0
                      maximum: 9
                    parallelism:
                      type: integer
                      format: int32
                    incremental:
                      type: boolean
                      default: false
                dataLoading:
                  description: DataLoading defines data loading configuration.
                  type: object
                  properties:
                    enabled:
                      type: boolean
                      default: false
                    streamingServer:
                      type: object
                      required:
                        - host
                      properties:
                        host:
                          type: string
                        port:
                          type: integer
                          format: int32
                        tlsMode:
                          type: string
                          enum:
                            - none
                            - tls
                            - skip-verify
                          default: none
                        credentialSecret:
                          type: object
                          required:
                            - name
                          properties:
                            name:
                              type: string
                            key:
                              type: string
                    jobs:
                      type: array
                      items:
                        type: object
                        required:
                          - name
                          - type
                          - targetTable
                        properties:
                          name:
                            type: string
                          type:
                            type: string
                            enum:
                              - s3
                              - kafka
                              - rabbitmq
                          enabled:
                            type: boolean
                            default: false
                          schedule:
                            type: string
                          targetTable:
                            type: string
                          s3Source:
                            type: object
                            required:
                              - bucket
                            properties:
                              bucket:
                                type: string
                              path:
                                type: string
                              endpoint:
                                type: string
                              region:
                                type: string
                              format:
                                type: string
                                enum:
                                  - csv
                                  - json
                                  - avro
                              credentialSecret:
                                type: object
                                required:
                                  - name
                                properties:
                                  name:
                                    type: string
                                  key:
                                    type: string
                              forcePathStyle:
                                type: boolean
                                default: false
                          kafkaSource:
                            type: object
                            required:
                              - brokers
                              - topic
                            properties:
                              brokers:
                                type: array
                                items:
                                  type: string
                              topic:
                                type: string
                              groupId:
                                type: string
                              format:
                                type: string
                                enum:
                                  - json
                                  - avro
                                  - csv
                              startOffset:
                                type: string
                                enum:
                                  - earliest
                                  - latest
                                default: earliest
                          rabbitMQSource:
                            type: object
                            required:
                              - host
                              - queue
                            properties:
                              host:
                                type: string
                              port:
                                type: integer
                                format: int32
                              vhost:
                                type: string
                              queue:
                                type: string
                              format:
                                type: string
                                enum:
                                  - json
                                  - avro
                                  - csv
                              credentialSecret:
                                type: object
                                required:
                                  - name
                                properties:
                                  name:
                                    type: string
                                  key:
                                    type: string
                deletionPolicy:
                  description: DeletionPolicy defines the PV reclaim policy on cluster deletion.
                  type: string
                  enum:
                    - Retain
                    - Delete
                  default: Retain
                backupOnDelete:
                  type: boolean
                  default: false
                storage:
                  description: Storage defines storage management configuration.
                  type: object
                  properties:
                    diskMonitoring:
                      type: boolean
                      default: false
                    recommendationScan:
                      type: object
                      properties:
                        enabled:
                          type: boolean
                          default: false
                        schedule:
                          type: string
                        bloatThreshold:
                          type: integer
                          format: int32
                        skewThreshold:
                          type: integer
                          format: int32
                        ageThreshold:
                          type: integer
                          format: int64
                        indexBloatThreshold:
                          type: integer
                          format: int32
                        scanDuration:
                          type: string
                    usageReport:
                      type: object
                      properties:
                        enabled:
                          type: boolean
                          default: false
                        monthly:
                          type: boolean
                          default: false
            status:
              description: CloudberryClusterStatus defines the observed state of CloudberryCluster.
              type: object
              properties:
                phase:
                  type: string
                coordinatorReady:
                  type: boolean
                standbyReady:
                  type: boolean
                segmentsReady:
                  type: integer
                  format: int32
                segmentsTotal:
                  type: integer
                  format: int32
                mirroringStatus:
                  type: string
                clusterVersion:
                  type: string
                lastReconcileTime:
                  type: string
                  format: date-time
                lastConfigChangeTime:
                  type: string
                  format: date-time
                activeQueries:
                  type: integer
                  format: int32
                queuedQueries:
                  type: integer
                  format: int32
                blockedQueries:
                  type: integer
                  format: int32
                lastBackupTime:
                  type: string
                  format: date-time
                lastBackupStatus:
                  type: string
                dataLoadingJobs:
                  type: integer
                  format: int32
                diskUsagePercent:
                  type: integer
                  format: int32
                recommendationCount:
                  type: integer
                  format: int32
                observedGeneration:
                  type: integer
                  format: int64
                conditions:
                  type: array
                  items:
                    type: object
                    required:
                      - lastTransitionTime
                      - message
                      - reason
                      - status
                      - type
                    properties:
                      lastTransitionTime:
                        type: string
                        format: date-time
                      message:
                        type: string
                        maxLength: 32768
                      observedGeneration:
                        type: integer
                        format: int64
                        minimum: 0
                      reason:
                        type: string
                        maxLength: 1024
                        minLength: 1
                        pattern: "^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$"
                      status:
                        type: string
                        enum:
                          - "True"
                          - "False"
                          - Unknown
                      type:
                        type: string
                        maxLength: 316
                        pattern: "^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$"
                failedSegments:
                  type: array
                  items:
                    type: object
                    required:
                      - contentID
                      - hostname
                      - role
                      - status
                    properties:
                      contentID:
                        type: integer
                        format: int32
                      hostname:
                        type: string
                      role:
                        type: string
                      status:
                        type: string
