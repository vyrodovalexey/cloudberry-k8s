apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "vmagent.fullname" . }}
  labels:
    {{- include "vmagent.labels" . | nindent 4 }}
data:
  scrape.yml: |
    global:
      scrape_interval: {{ .Values.scrapeConfig.scrapeInterval }}

    scrape_configs:
      - job_name: 'kubernetes-pods'
        # Preserve a scraped target's own `job` label (e.g. the operator's
        # cloudberry_data_loading_job_status{job=<load-job>}); without this the
        # scrape `job=kubernetes-pods` collides and the metric label is renamed
        # to `exported_job`, breaking dashboards/PromQL that use {job}.
        honor_labels: true
        kubernetes_sd_configs:
          - role: pod
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
            action: keep
            regex: true
          # Copy annotation port to __tmp_port for comparison
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_port]
            target_label: __tmp_port
          # Copy container port number to __tmp_container_port
          - source_labels: [__meta_kubernetes_pod_container_port_number]
            target_label: __tmp_container_port
          # When annotation port is set, keep only matching container port
          - if: '{__tmp_port!=""}'
            source_labels: [__tmp_port, __tmp_container_port]
            action: keep_if_equal
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
            action: replace
            target_label: __metrics_path__
            regex: (.+)
          - source_labels: [__address__, __meta_kubernetes_pod_annotation_prometheus_io_port]
            action: replace
            regex: ([^:]+)(?::\d+)?;(\d+)
            replacement: $1:$2
            target_label: __address__
          - source_labels: [__meta_kubernetes_namespace]
            action: replace
            target_label: namespace
          - source_labels: [__meta_kubernetes_pod_name]
            action: replace
            target_label: pod
          - source_labels: [__meta_kubernetes_pod_label_app_kubernetes_io_component]
            action: replace
            target_label: component

      # -----------------------------------------------------------------
      # PXF Spring Boot Actuator (M.2/M.3: http_server_requests_seconds_*)
      # -----------------------------------------------------------------
      # The segment-primary pods already carry prometheus.io/scrape
      # annotations for the pg-exporter (:9187 /metrics). A single pod
      # annotation cannot cover two targets, so this SEPARATE job
      # discovers the PXF sidecar actuator endpoint by label + container
      # port. It selects pods with:
      #   app.kubernetes.io/component = segment-primary
      #   container port 5888 (named "pxf")
      # and scrapes /actuator/prometheus on that port.
      - job_name: 'pxf-actuator'
        kubernetes_sd_configs:
          - role: pod
        metrics_path: /actuator/prometheus
        relabel_configs:
          # Keep only pods labelled as segment-primary (PXF sidecar host).
          - source_labels: [__meta_kubernetes_pod_label_app_kubernetes_io_component]
            action: keep
            regex: segment-primary
          # Keep only the container port named "pxf" (5888).
          - source_labels: [__meta_kubernetes_pod_container_port_name]
            action: keep
            regex: pxf
          # Override the scrape address to use port 5888.
          - source_labels: [__address__]
            action: replace
            regex: ([^:]+)(?::\d+)?
            replacement: $1:5888
            target_label: __address__
          # Standard metadata labels.
          - source_labels: [__meta_kubernetes_namespace]
            action: replace
            target_label: namespace
          - source_labels: [__meta_kubernetes_pod_name]
            action: replace
            target_label: pod
          - source_labels: [__meta_kubernetes_pod_label_app_kubernetes_io_component]
            action: replace
            target_label: component

      - job_name: 'kubernetes-service-endpoints'
        # Preserve a scraped target's own `job` label (avoid exported_job).
        honor_labels: true
        kubernetes_sd_configs:
          - role: endpointslice
        relabel_configs:
          - source_labels: [__meta_kubernetes_service_annotation_prometheus_io_scrape]
            action: keep
            regex: true
          # Copy annotation port to __tmp_port for comparison
          - source_labels: [__meta_kubernetes_service_annotation_prometheus_io_port]
            target_label: __tmp_port
          # Copy endpointslice port to __tmp_ep_port
          - source_labels: [__meta_kubernetes_endpointslice_port]
            target_label: __tmp_ep_port
          # When annotation port is set, keep only matching endpointslice port
          - if: '{__tmp_port!=""}'
            source_labels: [__tmp_port, __tmp_ep_port]
            action: keep_if_equal
          - source_labels: [__meta_kubernetes_service_annotation_prometheus_io_path]
            action: replace
            target_label: __metrics_path__
            regex: (.+)
          - source_labels: [__address__, __meta_kubernetes_service_annotation_prometheus_io_port]
            action: replace
            regex: ([^:]+)(?::\d+)?;(\d+)
            replacement: $1:$2
            target_label: __address__
          - source_labels: [__meta_kubernetes_namespace]
            action: replace
            target_label: namespace
          - source_labels: [__meta_kubernetes_service_name]
            action: replace
            target_label: service
          - source_labels: [__meta_kubernetes_pod_name]
            action: replace
            target_label: pod
