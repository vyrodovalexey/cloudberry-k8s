apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: {{ include "node-exporter.fullname" . }}
  labels:
    {{- include "node-exporter.labels" . | nindent 4 }}
spec:
  selector:
    matchLabels:
      {{- include "node-exporter.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        prometheus.io/scrape: {{ .Values.prometheus.scrape | quote }}
        prometheus.io/port: {{ .Values.prometheus.port | quote }}
        prometheus.io/path: {{ .Values.prometheus.path | quote }}
      labels:
        {{- include "node-exporter.selectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "node-exporter.serviceAccountName" . }}
      hostPID: {{ .Values.hostPID }}
      hostNetwork: {{ .Values.hostNetwork }}
      containers:
        - name: node-exporter
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            - --path.rootfs=/host
            - --web.listen-address=:{{ .Values.metricsPort }}
            - --collector.filesystem.mount-points-exclude={{ .Values.filesystemMountPointsExclude }}
          ports:
            - name: metrics
              containerPort: {{ .Values.metricsPort }}
              hostPort: {{ .Values.metricsPort }}
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /
              port: metrics
            initialDelaySeconds: 5
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /
              port: metrics
            initialDelaySeconds: 5
            periodSeconds: 15
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: rootfs
              mountPath: /host
              readOnly: true
          securityContext:
            readOnlyRootFilesystem: true
      volumes:
        - name: rootfs
          hostPath:
            path: /
