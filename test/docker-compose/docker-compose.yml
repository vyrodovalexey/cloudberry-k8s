# =============================================================================
# Cloudberry Operator Test Environment
# =============================================================================
# Port allocation:
#   8200       - Vault (dev mode, root token: myroot)
#   8090/8091  - Keycloak (admin/admin)
#   3200       - Tempo HTTP API
#   4317/4318  - OTLP receivers
#   8428       - VictoriaMetrics
#   9428       - VictoriaLogs
#   3000       - Grafana
#   9000/9001  - MinIO (S3-compatible storage, minioadmin/minioadmin)
#   9094       - Kafka (KRaft mode, external listener)
#   5672/15672 - RabbitMQ (guest/guest)
#   8020/9870  - HDFS NameNode (RPC / WebUI+WebHDFS)
#   9864/9866  - HDFS DataNode (WebUI / data transfer)
#   9083       - Hive Metastore (Thrift)
#   10000/10002- HiveServer2 (JDBC / WebUI)
#   3306       - MySQL (PXF JDBC source mysql-oltp, pxfuser/pxfpass)
#   5432       - PostgreSQL source (PXF JDBC source postgres-source, pxfuser/pxfpass)
#   2181       - HBase ZooKeeper (PXF hbase:* external-table tests)
#   16010      - HBase Master WebUI
#   16020/16030- HBase RegionServer RPC / WebUI
#
# Setup order:
#   1. docker compose up -d
#   2. Wait for Vault and Keycloak to be ready
#   3. Run scripts/setup-vault.sh     (configures PKI, issues certs)
#   4. Run scripts/setup-keycloak.sh  (creates realm, clients for service-to-service)
#   5. Run scripts/setup-minio.sh     (creates test buckets)
#   6. Run scripts/setup-kafka.sh     (creates test topics)
#   7. Run scripts/setup-rabbitmq.sh  (creates test queues)
#   8. Run scripts/setup-hive-hdfs.sh (creates HDFS warehouse + sample Hive table)
#   9. Run scripts/setup-jdbc-sources.sh (seeds MySQL + PostgreSQL JDBC sources)
#  10. Run scripts/setup-hbase.sh     (creates sample HBase table for PXF tests)
#  11. Run scripts/gen-objstore-samples.sh (generates object-store sample data in MinIO)
#  12. Run scripts/gen-hadoop-samples.sh   (generates Hadoop HDFS/Hive/HBase sample data)
#  13. Run scripts/gen-pushdown-samples.sh (generates pushdown/projection/error sample data)
#  14. Run scripts/gen-export-targets.sh   (prepares Scenario 99 writable-export targets)
#  15. Run scripts/gen-gpload-csv.sh       (generates Scenario 101 gpload CSV sample data)
#  16. Run scripts/gen-kafka-cdc.sh        (generates Scenario 102 kafka-cdc sample messages)
# =============================================================================

services:
  # ===========================================================================
  # Vault - PKI for mTLS certificates
  # ===========================================================================
  vault:
    image: hashicorp/vault:1.17
    container_name: vault
    volumes:
      - vault_data:/vault/file
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: myroot
      VAULT_DEV_LISTEN_ADDRESS: 0.0.0.0:8200
      VAULT_ADDR: http://127.0.0.1:8200
    cap_add:
      - IPC_LOCK
    ports:
      - 8200:8200
    healthcheck:
      test: ["CMD", "vault", "status"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s


  # ===========================================================================
  # Keycloak - OIDC provider for authentication testing
  # ===========================================================================
  keycloak_web:
    image: quay.io/keycloak/keycloak:26.5
    container_name: keycloak_web
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://keycloakdb:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: password

      KC_HTTP_PORT: 8090
      KC_HOSTNAME_STRICT: false
      KC_HOSTNAME_STRICT_HTTPS: false
      KC_HTTP_ENABLED: true
      KC_PROXY_HEADERS: xforwarded
      KC_FEATURES: token-exchange,admin-fine-grained-authz
      KC_SPI_REALM_DEFAULT_SSL_REQUIRED: none

      KC_LOG_LEVEL: info
      KC_METRICS_ENABLED: true
      KC_HEALTH_ENABLED: true
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    command: start-dev
    depends_on:
      keycloakdb:
        condition: service_healthy
    ports:
      - 8090:8090
      - 8091:9000
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/9000 && echo -e 'GET /health/ready HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n' >&3 && cat <&3 | grep -q '\"UP\"'"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 30s

  keycloakdb:
    image: postgres:16
    container_name: keycloakdb
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: password
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keycloak"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  # ===========================================================================
  # Observability stack
  # ===========================================================================
  tempo:
    image: grafana/tempo:2.7.1
    container_name: tempo
    command:
      - -config.file=/etc/tempo/tempo.yaml
    volumes:
      - tempo_data:/var/tempo
      - ./tempo/tempo.yaml:/etc/tempo/tempo.yaml:ro
    ports:
      - 3200:3200    # Tempo HTTP API
      - 4317:4317    # OTLP gRPC receiver
      - 4318:4318    # OTLP HTTP receiver

  victoriametrics:
    image: victoriametrics/victoria-metrics:v1.108.1
    container_name: victoriametrics
    ports:
      - 8428:8428
    volumes:
      - victoriametrics_data:/victoria-metrics-data
      - ./victoriametrics/scrape.yml:/etc/victoriametrics/promscrape.yml:ro
    command:
      - --promscrape.config=/etc/victoriametrics/promscrape.yml
      - --storageDataPath=/victoria-metrics-data
      - --httpListenAddr=:8428
      - --retentionPeriod=30d

  victorialogs:
    image: victoriametrics/victoria-logs:v1.3.2-victorialogs
    container_name: victorialogs
    ports:
      - 9428:9428
    volumes:
      - victorialogs_data:/victoria-logs-data
    command:
      - --storageDataPath=/victoria-logs-data
      - --httpListenAddr=:9428
      - --retentionPeriod=30d
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:9428/health"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  grafana:
    image: grafana/grafana:11.5.2
    container_name: grafana
    ports:
      - 3000:3000
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
      GF_INSTALL_PLUGINS: victoriametrics-logs-datasource
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ../../monitoring/grafana:/var/lib/grafana/dashboards/avapigw:ro
    depends_on:
      - victoriametrics
      - victorialogs
      - tempo

  # ===========================================================================
  # MinIO - S3-compatible object storage for backup testing
  # ===========================================================================
  minio:
    image: minio/minio:RELEASE.2024-11-07T00-52-20Z
    container_name: minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - 9000:9000
      - 9001:9001
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  # ===========================================================================
  # Kafka (KRaft mode - no ZooKeeper)
  # ===========================================================================
  kafka:
    image: apache/kafka:3.9.0
    container_name: kafka
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093,EXTERNAL://:9094
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,EXTERNAL://127.0.0.1:9094
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      CLUSTER_ID: "cloudberry-test-kafka-cluster"
    ports:
      - 9094:9094
    volumes:
      - kafka_data:/tmp/kraft-combined-logs
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 30s

  # ===========================================================================
  # RabbitMQ
  # ===========================================================================
  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - 5672:5672
      - 15672:15672
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  # ===========================================================================
  # HDFS - Hadoop Distributed File System (single-node: NameNode + DataNode)
  # Backing store for PXF hdfs:* / hive:* external-table data-loading tests.
  # Endpoints match the PXF server config in
  # specifications/12-data-loading-spec.md (hdfs://namenode:8020).
  # ===========================================================================
  namenode:
    image: apache/hadoop:3.4.1
    container_name: namenode
    hostname: namenode
    user: root
    # Format the NameNode storage dir on first start (idempotent: the format
    # is skipped once VERSION exists), then run the NameNode. The apache/hadoop
    # image has no auto-format entrypoint, so this is done explicitly here.
    command:
      - bash
      - -c
      - |
        set -e
        mkdir -p /hadoop/dfs/name
        if [ ! -f /hadoop/dfs/name/current/VERSION ]; then
          echo "Formatting HDFS NameNode (first start)..."
          hdfs namenode -format -nonInteractive -force
        fi
        exec hdfs namenode
    environment:
      HADOOP_CONF_DIR: /opt/hadoop/etc/hadoop
    volumes:
      - hdfs_namenode:/hadoop/dfs/name
      - ./hadoop/core-site.xml:/opt/hadoop/etc/hadoop/core-site.xml:ro
      - ./hadoop/hdfs-site.xml:/opt/hadoop/etc/hadoop/hdfs-site.xml:ro
    ports:
      - 8020:8020    # NameNode RPC (fs.defaultFS)
      - 9870:9870    # NameNode WebUI + WebHDFS
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9870/webhdfs/v1/?op=LISTSTATUS || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 20s

  datanode:
    image: apache/hadoop:3.4.1
    container_name: datanode
    hostname: datanode
    user: root
    command: ["hdfs", "datanode"]
    environment:
      HADOOP_CONF_DIR: /opt/hadoop/etc/hadoop
    volumes:
      - hdfs_datanode:/hadoop/dfs/data
      - ./hadoop/core-site.xml:/opt/hadoop/etc/hadoop/core-site.xml:ro
      - ./hadoop/hdfs-site.xml:/opt/hadoop/etc/hadoop/hdfs-site.xml:ro
    ports:
      - 9864:9864    # DataNode WebUI
      - 9866:9866    # DataNode data transfer (needed for PXF from k8s)
    depends_on:
      namenode:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9864 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 20s

  # ===========================================================================
  # Hive - Metastore (Thrift) + HiveServer2 (JDBC) over the test HDFS
  # Metastore Thrift endpoint matches the PXF config:
  # thrift://hive-metastore:9083
  # ===========================================================================
  hive-metastore-db:
    image: postgres:16
    container_name: hive-metastore-db
    environment:
      POSTGRES_DB: metastore
      POSTGRES_USER: hive
      POSTGRES_PASSWORD: hive
    volumes:
      - hive_metastore_db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hive -d metastore"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  hive-metastore:
    image: apache/hive:4.0.1
    container_name: hive-metastore
    hostname: hive-metastore
    environment:
      SERVICE_NAME: metastore
      DB_DRIVER: postgres
      # IS_RESUME=false runs schematool -initOrUpgradeSchema on start. This is
      # idempotent on Hive 4 (initOrUpgrade is a no-op once the schema exists),
      # so the metastore self-initializes the Postgres backend on first boot.
      IS_RESUME: "false"
      # hive-site.xml is symlinked into $HIVE_HOME/conf by the entrypoint.
      HIVE_CUSTOM_CONF_DIR: /hive-custom-conf
      SERVICE_OPTS: >-
        -Djavax.jdo.option.ConnectionDriverName=org.postgresql.Driver
        -Djavax.jdo.option.ConnectionURL=jdbc:postgresql://hive-metastore-db:5432/metastore
        -Djavax.jdo.option.ConnectionUserName=hive
        -Djavax.jdo.option.ConnectionPassword=hive
    volumes:
      - ./hive/hive-site.xml:/hive-custom-conf/hive-site.xml:ro
      - ./hadoop/core-site.xml:/hive-custom-conf/core-site.xml:ro
      - ./hadoop/hdfs-site.xml:/hive-custom-conf/hdfs-site.xml:ro
      # PostgreSQL JDBC driver (not bundled in the apache/hive image).
      - ./hive/lib/postgresql-42.7.4.jar:/opt/hive/lib/postgresql-42.7.4.jar:ro
    ports:
      - 9083:9083    # Metastore Thrift
    depends_on:
      hive-metastore-db:
        condition: service_healthy
      namenode:
        condition: service_healthy
    healthcheck:
      # Use bash explicitly: the image's /bin/sh (dash) has no /dev/tcp support.
      test: ["CMD", "bash", "-c", "exec 3<>/dev/tcp/localhost/9083"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 40s

  hiveserver2:
    image: apache/hive:4.0.1
    container_name: hiveserver2
    hostname: hiveserver2
    environment:
      SERVICE_NAME: hiveserver2
      # Schema is owned by the metastore; HiveServer2 must skip schema init.
      IS_RESUME: "true"
      HIVE_CUSTOM_CONF_DIR: /hive-custom-conf
      SERVICE_OPTS: >-
        -Dhive.metastore.uris=thrift://hive-metastore:9083
    volumes:
      - ./hive/hive-site.xml:/hive-custom-conf/hive-site.xml:ro
      - ./hadoop/core-site.xml:/hive-custom-conf/core-site.xml:ro
      - ./hadoop/hdfs-site.xml:/hive-custom-conf/hdfs-site.xml:ro
      - ./hive/lib/postgresql-42.7.4.jar:/opt/hive/lib/postgresql-42.7.4.jar:ro
    ports:
      - 10000:10000  # HiveServer2 Thrift (JDBC)
      - 10002:10002  # HiveServer2 WebUI
    depends_on:
      hive-metastore:
        condition: service_healthy
    healthcheck:
      # Use bash explicitly: the image's /bin/sh (dash) has no /dev/tcp support.
      test: ["CMD", "bash", "-c", "exec 3<>/dev/tcp/localhost/10000"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 60s

  # ===========================================================================
  # MySQL - PXF JDBC source (mysql-oltp)
  # Used by Scenario 93 for external-table data-loading tests via PXF JDBC.
  # jdbc:mysql://mysql:3306/oltp  user=pxfuser  password=pxfpass
  # ===========================================================================
  mysql:
    image: mysql:8.0
    container_name: mysql
    hostname: mysql
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: oltp
      MYSQL_USER: pxfuser
      MYSQL_PASSWORD: pxfpass
    ports:
      - 3306:3306
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-prootpass"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 30s

  # ===========================================================================
  # PostgreSQL source - PXF JDBC source (postgres-source)
  # Dedicated generic Postgres instance for PXF JDBC external-table tests.
  # jdbc:postgresql://pgsource:5432/sourcedb  user=pxfuser  password=pxfpass
  # ===========================================================================
  pgsource:
    image: postgres:16
    container_name: pgsource
    hostname: pgsource
    environment:
      POSTGRES_DB: sourcedb
      POSTGRES_USER: pxfuser
      POSTGRES_PASSWORD: pxfpass
    ports:
      - 5432:5432
    volumes:
      - pgsource_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pxfuser -d sourcedb"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  # ===========================================================================
  # HBase - Single-node pseudo-distributed HBase (bundles ZooKeeper)
  # Provides ZooKeeper quorum at hbase:2181 for PXF hbase:* external-table
  # tests (Scenario 93 acceptance test).
  # ===========================================================================
  hbase:
    image: harisekhon/hbase:2.1
    container_name: hbase
    hostname: hbase
    ports:
      - 2181:2181      # ZooKeeper client port
      - 16010:16010    # HBase Master WebUI
      - 16020:16020    # HBase RegionServer RPC
      - 16030:16030    # HBase RegionServer WebUI
    volumes:
      - hbase_data:/hbase-data
    healthcheck:
      test: ["CMD-SHELL", "echo ruok | nc 127.0.0.1 2181 | grep -q imok"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 30s

volumes:
  postgres_data:
  vault_data:
  victoriametrics_data:
  victorialogs_data:
  grafana_data:
  tempo_data:
  mtls_certs:
  minio_data:
  kafka_data:
  rabbitmq_data:
  hdfs_namenode:
  hdfs_datanode:
  hive_metastore_db:
  mysql_data:
  pgsource_data:
  hbase_data:
