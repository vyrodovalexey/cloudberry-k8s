# Scenario 7: Load Data for Subsequent Scenarios
#
# This file documents the data loading process that prepares the mydb database
# with tables and data suitable for testing redistribution, skew analysis,
# and other data management scenarios.
#
# Architecture:
#   kubectl exec --> Coordinator Pod --> psql --> Cloudberry DB (mydb)
#
# Prerequisites:
#   1. A running Cloudberry cluster in the cloudberry-test namespace
#   2. kubectl access to the cluster
#   3. The coordinator pod (scenario1-cluster-coordinator-0) is running
#
# ============================================================================
# 7a. Database Recreation
# ============================================================================
#
# Drop and recreate mydb to start fresh:
#
#   kubectl exec -n cloudberry-test scenario1-cluster-coordinator-0 -- \
#     /usr/local/cloudberry-db/bin/psql -U gpadmin -d postgres -c "
#     SELECT pg_terminate_backend(pid) FROM pg_stat_activity
#     WHERE datname = 'mydb' AND pid != pg_backend_pid();"
#
#   kubectl exec -n cloudberry-test scenario1-cluster-coordinator-0 -- \
#     /usr/local/cloudberry-db/bin/psql -U gpadmin -d postgres -c "DROP DATABASE IF EXISTS mydb;"
#
#   kubectl exec -n cloudberry-test scenario1-cluster-coordinator-0 -- \
#     /usr/local/cloudberry-db/bin/psql -U gpadmin -d postgres -c "CREATE DATABASE mydb;"
#
# ============================================================================
# 7b. Table Definitions
# ============================================================================
#
# Five tables are created with different distribution strategies:
#
# Table: orders
#   Distribution: DISTRIBUTED BY (customer_id)
#   Purpose: Hash-distributed table with Pareto skew (few customers have many orders)
#   Columns: id, customer_id, order_date, amount, status, shipping_address, notes
#   Indexes: idx_orders_customer, idx_orders_date, idx_orders_status
#
# Table: customers
#   Distribution: DISTRIBUTED BY (id)
#   Purpose: Hash-distributed table with even distribution (sequential IDs)
#   Columns: id, name, email, tier, address, city, country, phone, created_at, last_order_at
#   Indexes: idx_customers_email, idx_customers_tier
#
# Table: logs
#   Distribution: DISTRIBUTED RANDOMLY
#   Purpose: Randomly distributed table (no hash key, round-robin)
#   Columns: id, log_level, source, message, metadata, created_at
#   Indexes: idx_logs_level, idx_logs_source, idx_logs_created
#
# Table: audit_log
#   Distribution: DISTRIBUTED BY (id)
#   Purpose: Designated for exclusion from redistribution operations
#   Columns: id, event_type, entity_type, entity_id, actor, payload, created_at
#   Indexes: idx_audit_event, idx_audit_entity
#
# Table: temp_staging
#   Distribution: DISTRIBUTED BY (batch_id)
#   Purpose: Temp-pattern table for ETL operations (batch processing)
#   Columns: batch_id, row_num, raw_data, processed, error_msg, loaded_at
#   Indexes: idx_staging_batch
#
# ============================================================================
# 7c. Data Loading
# ============================================================================
#
# Data volumes:
#   - customers:    100,000 rows (evenly distributed across segments)
#   - orders:       500,000 rows (Pareto-distributed by customer_id)
#   - logs:         200,000 rows (randomly distributed)
#   - audit_log:    150,000 rows (evenly distributed by sequential id)
#   - temp_staging:  50,000 rows (distributed by batch_id)
#   - Total:      1,000,000 rows
#
# Pareto Distribution for orders:
#   The customer_id is generated using: floor(100000 * power(random(), 3)) + 1
#   This creates a power-law distribution where:
#     - customer_id=1 receives ~10,000+ orders (2% of all orders)
#     - Top 10 customers receive ~4% of all orders
#     - Top 100 customers receive ~10% of all orders
#     - Bottom 50% of customers receive very few orders
#
# Customer Tiers:
#   - enterprise: customer_id 1-100 (100 customers)
#   - premium:    customer_id 101-1000 (900 customers)
#   - standard:   customer_id 1001-10000 (9,000 customers)
#   - basic:      customer_id 10001-100000 (90,000 customers)
#
# ============================================================================
# 7d. Expected Results
# ============================================================================
#
# Table Sizes (approximate):
#   public.orders       | 80 MB
#   public.logs         | 44 MB
#   public.audit_log    | 26 MB
#   public.customers    | 24 MB
#   public.temp_staging | 6 MB
#   Total DB size:      | ~278 MB
#
# Segment Distribution for orders (4 segments):
#   Segment 0: ~25.1%
#   Segment 1: ~26.1%
#   Segment 2: ~24.3%
#   Segment 3: ~24.5%
#
#   Note: While the segment-level distribution appears relatively even (~25% each),
#   the skew exists at the customer_id level within segments. The hash function
#   distributes customer_ids across segments, but within each segment, some
#   customer_ids have disproportionately more rows. This is the key insight:
#   redistribution by a different key could improve query performance.
#
# Segment Distribution for customers (4 segments, even):
#   Segment 0: ~25.1%
#   Segment 1: ~25.0%
#   Segment 2: ~24.9%
#   Segment 3: ~24.9%
#
# Segment Distribution for logs (4 segments, random/even):
#   Segment 0: ~24.9%
#   Segment 1: ~24.9%
#   Segment 2: ~25.0%
#   Segment 3: ~25.1%
#
# Top customers by order count (Pareto skew):
#   customer_id=1:  ~10,000+ orders
#   customer_id=2:  ~2,800 orders
#   customer_id=3:  ~2,000 orders
#   customer_id=4:  ~1,500 orders
#   customer_id=5:  ~1,300 orders
#
# ============================================================================
# 7e. Verification Commands
# ============================================================================
#
# Check row counts:
#   kubectl exec -n cloudberry-test scenario1-cluster-coordinator-0 -- \
#     /usr/local/cloudberry-db/bin/psql -U gpadmin -d mydb -c "
#     SELECT 'orders' as table_name, count(*) FROM orders
#     UNION ALL SELECT 'customers', count(*) FROM customers
#     UNION ALL SELECT 'logs', count(*) FROM logs
#     UNION ALL SELECT 'audit_log', count(*) FROM audit_log
#     UNION ALL SELECT 'temp_staging', count(*) FROM temp_staging;"
#
# Check segment distribution:
#   kubectl exec -n cloudberry-test scenario1-cluster-coordinator-0 -- \
#     /usr/local/cloudberry-db/bin/psql -U gpadmin -d mydb -c "
#     SELECT gp_segment_id, count(*) as rows,
#            round(count(*)::numeric / sum(count(*)) OVER () * 100, 1) as pct
#     FROM orders GROUP BY gp_segment_id ORDER BY gp_segment_id;"
#
# Check skew at customer level:
#   kubectl exec -n cloudberry-test scenario1-cluster-coordinator-0 -- \
#     /usr/local/cloudberry-db/bin/psql -U gpadmin -d mydb -c "
#     SELECT customer_id, count(*) as order_count
#     FROM orders GROUP BY customer_id ORDER BY order_count DESC LIMIT 10;"
#
# Check database size:
#   kubectl exec -n cloudberry-test scenario1-cluster-coordinator-0 -- \
#     /usr/local/cloudberry-db/bin/psql -U gpadmin -d mydb -c "
#     SELECT pg_size_pretty(pg_database_size('mydb')) as db_size;"
#
# ============================================================================
# 7f. Run ANALYZE
# ============================================================================
#
# After loading data, run ANALYZE to update statistics for the query planner:
#   kubectl exec -n cloudberry-test scenario1-cluster-coordinator-0 -- \
#     /usr/local/cloudberry-db/bin/psql -U gpadmin -d mydb -c "ANALYZE;"
#
# This ensures the query optimizer has accurate statistics for:
#   - Table row counts
#   - Column value distributions
#   - Index selectivity
#   - Join cardinality estimates
