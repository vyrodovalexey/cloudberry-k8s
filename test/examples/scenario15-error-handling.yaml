# Scenario 15: Error Handling and Resilience
#
# This scenario tests the operator's error handling capabilities:
#   1. Invalid CR submission (webhook rejection)
#   2. Invalid configuration parameters (pod crash detection and recovery)
#   3. Pod failure mid-operation (automatic recovery via StatefulSet)
#   4. Coordinator unreachable (NetworkPolicy-based, requires Calico/Cilium CNI)
#
# Prerequisites:
#   - A running CloudberryCluster (e.g., scenario1-cluster)
#   - For NetworkPolicy tests: a CNI that enforces NetworkPolicies (Calico, Cilium)
#
# Usage:
#   # 1. Ensure cluster is running
#   kubectl wait --for=jsonpath='{.status.phase}'=Running cloudberrycluster/scenario1-cluster -n cloudberry-test --timeout=300s
#
#   # 2. Test: Invalid segment count (should be rejected by webhook)
#   kubectl apply -f test/examples/scenario15-error-handling.yaml 2>&1
#   # Expected: "spec.segments.count: Invalid value: 0: spec.segments.count in body should be greater than or equal to 1"
#
#   # 3. Test: Invalid parameter value (causes CrashLoopBackOff, then recovery)
#   kubectl patch cloudberrycluster scenario1-cluster -n cloudberry-test --type=merge -p '{"spec":{"config":{"parameters":{"shared_buffers":"banana"}}}}'
#   # Wait for pods to enter CrashLoopBackOff
#   kubectl get pods -n cloudberry-test -l app.kubernetes.io/managed-by=cloudberry-operator -w
#   # Revert to recover
#   kubectl patch cloudberrycluster scenario1-cluster -n cloudberry-test --type=merge -p '{"spec":{"config":{"parameters":{"shared_buffers":"2GB"}}}}'
#
#   # 4. Test: Kill a segment pod (StatefulSet auto-recovery)
#   kubectl delete pod scenario1-cluster-segment-primary-0 -n cloudberry-test --grace-period=0 --force
#   # Pod should recover within 30 seconds
#   kubectl wait --for=condition=ready pod/scenario1-cluster-segment-primary-0 -n cloudberry-test --timeout=60s
#
#   # 5. Test: Coordinator unreachable via NetworkPolicy (requires Calico/Cilium)
#   kubectl apply -f - <<EOF
#   apiVersion: networking.k8s.io/v1
#   kind: NetworkPolicy
#   metadata:
#     name: block-coordinator
#     namespace: cloudberry-test
#   spec:
#     podSelector:
#       matchLabels:
#         avsoft.io/component: coordinator
#     policyTypes:
#       - Ingress
#     ingress: []
#   EOF
#   # Monitor operator logs for timeout detection
#   kubectl logs -n cloudberry-test -l app.kubernetes.io/name=cloudberry-operator -f | grep -i "timeout\|error"
#   # Clean up
#   kubectl delete networkpolicy block-coordinator -n cloudberry-test
#
#   # 6. Verify metrics
#   kubectl port-forward -n cloudberry-test deployment/cloudberry-operator 8080:8080
#   curl -s http://localhost:8080/metrics | grep -E "cloudberry_reconcile_(total|errors_total|duration_seconds)"
#
# Expected Metrics:
#   - cloudberry_reconcile_total{result="error"} should increase during error scenarios
#   - cloudberry_reconcile_total{result="success"} should increase after recovery
#   - cloudberry_reconcile_errors_total should track cumulative errors
#   - cloudberry_fts_probe_failures_total should increase during coordinator unreachable test
#
---
# This CR is intentionally invalid and should be REJECTED by the webhook.
# It validates that the operator's admission webhook correctly prevents
# invalid configurations from being applied to the cluster.
apiVersion: avsoft.io/v1alpha1
kind: CloudberryCluster
metadata:
  name: invalid-test-1
  namespace: cloudberry-test
spec:
  image: "cloudberrydb/cloudberry:2.1.0"
  version: "2.1.0"
  coordinator:
    resources:
      requests:
        cpu: "250m"
        memory: "512Mi"
      limits:
        cpu: "1"
        memory: "2Gi"
    storage:
      size: "5Gi"
    port: 5432
  segments:
    # Invalid: count must be >= 1
    count: 0
    primariesPerHost: 2
    mirroring:
      enabled: true
      layout: "group"
    resources:
      requests:
        cpu: "250m"
        memory: "512Mi"
      limits:
        cpu: "1"
        memory: "2Gi"
    storage:
      size: "5Gi"
  deletionPolicy: Retain
