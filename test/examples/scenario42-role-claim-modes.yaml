apiVersion: avsoft.io/v1alpha1
kind: CloudberryCluster
metadata:
  name: scenario42-role-modes
  namespace: cloudberry-test
spec:
  version: "2.1.0"
  image: "cloudberrydb/cloudberry:2.1.0"
  coordinator:
    storage:
      size: "5Gi"
  segments:
    count: 2
    storage:
      size: "5Gi"
  auth:
    basic:
      enabled: true
      adminUser: gpadmin
    oidc:
      enabled: true
      issuerURL: http://keycloak:8090/realms/test
      clientID: cloudberry-operator
      roleClaimPath: "realm_access.roles"
      roleClaimSource: id_token
      roleMatchMode: exact
      roleMapping:
        admin: Admin
        operator: Operator
  deletionPolicy: Retain
