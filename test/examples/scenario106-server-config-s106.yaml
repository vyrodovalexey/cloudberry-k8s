# =============================================================================
# Scenario 105 — DataLoadingStatus PXF Fields (S.1–S.5)
# =============================================================================
# Acceptance cluster for the live DataLoadingStatus PXF sub-status:
#   S.1  status.dataLoading.pxf.status = Running (all segment-primary pxf
#        sidecars ready); stop pxf on a segment → Error/Stopped.
#   S.2  pxf.servers == number of configured server definitions (here: 3).
#   S.3  pxf.extensionsInstalled lists pxf and pxf_fdw (live pg_extension probe).
#   S.4  several enabled jobs run concurrently → activeJobs matches.
#   S.5  after a job runs, jobs[] has name/lastRun/lastStatus/rowsLoaded/duration.
#
# Topology mirrors scenario99-export-test: HA coord+standby, 2 segments mirrored
# (group), Vault-PKI TLS, OIDC, postgres-exporter on segments+mirrors,
# cloudberry-query-exporter, Vault k8s auth, DB cloudberry-official-pxf:2.1.0,
# PXF sidecar cloudberry-pxf:2.1.0. Namespace cloudberry-test.
# =============================================================================
apiVersion: avsoft.io/v1alpha1
kind: CloudberryCluster
metadata:
  name: s106
  namespace: cloudberry-test
  labels:
    app.kubernetes.io/managed-by: cloudberry-operator
    scenario: "106"
spec:
  version: "2.1.0"
  image: "cloudberry-official-pxf:2.1.0"
  imagePullPolicy: IfNotPresent

  coordinator:
    replicas: 1
    resources:
      requests:
        cpu: "100m"
        memory: "256Mi"
      limits:
        cpu: "500m"
        memory: "512Mi"
    storage:
      size: "2Gi"

  standby:
    enabled: true
    resources:
      requests:
        cpu: "100m"
        memory: "256Mi"
      limits:
        cpu: "500m"
        memory: "512Mi"
    storage:
      size: "2Gi"

  segments:
    count: 2
    primariesPerHost: 2
    resources:
      requests:
        cpu: "100m"
        memory: "256Mi"
      limits:
        cpu: "500m"
        memory: "512Mi"
    storage:
      size: "2Gi"
    mirroring:
      enabled: true
      layout: group
    antiAffinity: preferred

  auth:
    basic:
      enabled: true
      adminUser: gpadmin
    ssl:
      enabled: true
      certSecret:
        name: s106-tls
      minTLSVersion: "1.2"
    oidc:
      enabled: true
      issuerURL: "http://host.docker.internal:8090/realms/test"
      clientID: "cloudberry-operator"
      clientSecret:
        secretRef:
          name: oidc-client-secret
          key: client-secret
      scopes:
        - openid
        - profile
        - email
      roleClaimPath: "realm_access.roles"
      roleClaimSource: id_token
      roleMatchMode: exact
      roleMapping:
        admin: Admin
        user: Basic
        reader: "Self Only"
      pkce: true
      allowLocalSignIn: true
    hbaRules:
      - type: local
        database: all
        user: gpadmin
        method: trust
      - type: host
        database: all
        user: all
        address: "0.0.0.0/0"
        method: scram-sha-256

  ha:
    ftsProbeInterval: 60
    ftsProbeTimeout: 20
    ftsProbeRetries: 5

  vault:
    enabled: true
    address: "http://host.docker.internal:8200"
    authMethod: kubernetes
    authPath: "auth/kubernetes"
    role: "cloudberry-operator"
    secretPath: "secret/data/cloudberry"

  queryMonitoring:
    enabled: true
    guestAccess: false
    historyRetention: "30d"
    samplingInterval: 6
    planCollection: true
    slowQueryThreshold: "1000ms"
    exporters:
      postgresExporter:
        enabled: true
        image: "prometheuscommunity/postgres-exporter:v0.16.0"
        port: 9187
        segments: true
        mirrors: true
      cloudberryQueryExporter:
        enabled: true
        image: "cloudberry-query-exporter:1.0.0"
        port: 9188

  monitoring:
    enabled: true
    metricsPort: 9187
    serviceMonitor: false

  dataLoading:
    enabled: true
    pxf:
      enabled: true
      image: "cloudberry-pxf:2.1.0"
      jvmOpts: "-Xmx1g -Xms256m"
      port: 5888
      logLevel: INFO
      extensions:
        pxf: true
        pxfFdw: true
      # Scenario 106: 4 servers. minio-warehouse is the SL.7 update target;
      # hadoop-cluster is the SL.8 delete target.
      servers:
        - name: s3-datalake
          type: s3
          config:
            fs.s3a.endpoint: "http://minio:9000"
            fs.s3a.path.style.access: "true"
          credentialSecrets:
            - name: backup-s3-credentials
              key: aws_access_key_id
            - name: backup-s3-credentials
              key: aws_secret_access_key
        - name: minio-warehouse
          type: s3
          config:
            fs.s3a.endpoint: "http://minio:9000"
            fs.s3a.path.style.access: "true"
          credentialSecrets:
            - name: backup-s3-credentials
              key: aws_access_key_id
            - name: backup-s3-credentials
              key: aws_secret_access_key
        - name: hadoop-cluster
          type: hdfs
          config:
            fs.defaultFS: "hdfs://namenode:8020"
            dfs.replication: "1"
        - name: postgres-source
          type: jdbc
          config:
            jdbc.driver: "org.postgresql.Driver"
            jdbc.url: "jdbc:postgresql://pgsource:5432/sourcedb"
          credentialSecrets:
            - name: pg-source-credentials
              key: username
            - name: pg-source-credentials
              key: password
      resources:
        requests:
          cpu: "100m"
          memory: "256Mi"
        limits:
          cpu: "500m"
          memory: "1Gi"
    # S.4/S.5: several enabled read jobs → activeJobs matches; jobs[] gains
    # name/lastRun/lastStatus/rowsLoaded/duration once each Job runs.
    jobs:
      - name: s3-load
        type: pxf
        enabled: true
        pxfJob:
          server: s3-datalake
          profile: "s3:text"
          mode: insert
          resource: "cloudberry-data/text/data.csv"
          targetTable: "public.events"
      - name: hdfs-load
        type: pxf
        enabled: true
        pxfJob:
          server: hadoop-cluster
          profile: "hdfs:text"
          mode: insert
          resource: "/data-lake/text/"
          targetTable: "public.events_hdfs"
      - name: jdbc-load
        type: pxf
        enabled: true
        pxfJob:
          server: postgres-source
          profile: "jdbc"
          mode: insert
          resource: "jdbc_test_data"
          targetTable: "public.events_jdbc"

  deletionPolicy: Retain
