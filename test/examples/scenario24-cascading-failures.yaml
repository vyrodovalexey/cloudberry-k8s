# Scenario 24: Cascading Failures and Multi-Segment Recovery
#
# This scenario tests the cluster's resilience to cascading failures where
# multiple segments fail simultaneously. It validates that the operator and
# Kubernetes StatefulSet controller can recover from multi-segment failures
# without data loss, and tests the extreme case where both a primary and its
# mirror are killed simultaneously (theoretically unrecoverable).
#
# Prerequisites:
#   - Scenario 19 cluster running with mirrors (9 pods: 1 coord + 4 pri + 4 mir)
#   - All segments status='u', mode='s' (up and synced)
#   - Cluster phase=Running, mirroringStatus=InSync
#   - Test data loaded (orders table from scenario 7)
#
# Test Flow:
#
#   Step 1: Record baseline metrics
#     kubectl port-forward -n cloudberry-test deployment/cloudberry-operator 18100:8080
#     curl -s http://localhost:18100/metrics | grep "cloudberry_fts_failover_total"
#     # Record fts_failover_total as baseline
#
#   Step 2: Simultaneously kill 2 primary segment pods
#     kubectl delete pod scenario19-cluster-segment-primary-0 \
#       scenario19-cluster-segment-primary-1 \
#       -n cloudberry-test --grace-period=0 --force
#     # Monitor recovery every 3s for up to 90s
#     # Both pods should be recreated by StatefulSet controller
#     # Expected: primary-0 recovers in ~15s, primary-1 in ~27s
#     # Mirroring status may briefly show Degraded or remain InSync
#     #   depending on whether FTS probe fires during the outage window
#
#   Step 3: Verify detection and failover
#     # Check operator logs for failover/degraded messages
#     kubectl logs -n cloudberry-test -l app.kubernetes.io/name=cloudberry-operator --tail=50
#     # Check events for failover/segment events
#     kubectl get events -n cloudberry-test --sort-by=.lastTimestamp
#     # Check metrics: fts_failover_total should be unchanged if K8s
#     #   self-healing outpaced FTS detection
#     # Verify segment configuration: all segments status='u', mode='s'
#
#   Step 4: Verify cluster still serves queries
#     kubectl exec -n cloudberry-test scenario19-cluster-coordinator-0 -- \
#       /usr/local/cloudberry-db/bin/psql -U gpadmin -d mydb -c "
#         INSERT INTO orders (customer_id, amount, status)
#           VALUES (24, 24.24, 'cascading_test');
#         SELECT count(*) FROM orders;
#         SELECT count(*) FROM orders WHERE status = 'cascading_test';
#       "
#     # Expected: INSERT succeeds, all data accessible
#
#   Step 5: Wait for full recovery
#     # Verify all 9 pods Running 1/1
#     # Verify mirroringStatus=InSync
#     # Check post-recovery metrics:
#     #   - cloudberry_mirroring_in_sync = 1
#     #   - cloudberry_segments_failed = 0 (or stale; see note)
#
#   Step 6: Unrecoverable test — kill primary AND mirror for same segment
#     kubectl delete pod scenario19-cluster-segment-primary-3 \
#       scenario19-cluster-segment-mirror-3 \
#       -n cloudberry-test --grace-period=0 --force
#     # Both primary and mirror for content 3 are killed simultaneously
#     # In a traditional GPDB deployment, this would be unrecoverable
#     # In Kubernetes:
#     #   - StatefulSet controller recreates both pods
#     #   - PVCs retain data (deletionPolicy: Retain)
#     #   - Segments restart from persistent storage
#     #   - Recovery is automatic without operator intervention
#     # Wait for both pods to recover (typically <30s)
#     # Verify segment configuration: content 3 both status='u', mode='s'
#     # Verify data integrity: SELECT count(*) FROM orders
#
# Key Observations:
#   - Killing 2 primaries simultaneously does NOT trigger FTS failover if
#     Kubernetes recreates the pods faster than the FTS probe cycle. With
#     ftsProbeInterval=5s and ftsProbeRetries=2, the detection window is ~9s.
#     StatefulSet recreates pods in ~8-15s, creating a race condition where
#     K8s self-healing often outpaces FTS detection.
#
#   - Even in the "unrecoverable" scenario (both primary and mirror killed),
#     Kubernetes StatefulSet controller recreates both pods with persistent
#     storage intact. The segments recover automatically because:
#     1. PVCs are not deleted when pods are force-deleted
#     2. The entrypoint script detects existing data directories
#     3. PostgreSQL restarts from the existing data files
#     4. WAL replication re-establishes automatically
#
#   - This demonstrates that Kubernetes provides an additional layer of
#     resilience beyond traditional GPDB HA. The combination of StatefulSet
#     pod recreation + PVC persistence + FTS monitoring creates a robust
#     multi-layer recovery system.
#
#   - The fts_failover_total metric remaining unchanged during cascading
#     failures is actually a positive signal — it means K8s self-healing
#     resolved the issue before FTS needed to trigger a failover (which
#     would involve role swaps and potential data movement).
#
#   - Data integrity is maintained throughout all failure scenarios because
#     PVCs persist across pod deletions. The 400,006 orders remain accessible
#     after every failure and recovery cycle.
#
# Cascading Failure Recovery Matrix:
#   Failure Type              | Recovery Method        | Time  | Data Loss
#   ------------------------- | ---------------------- | ----- | ---------
#   1 primary killed          | StatefulSet recreate   | ~10s  | None
#   2 primaries killed        | StatefulSet recreate   | ~27s  | None
#   Primary + its mirror      | StatefulSet recreate   | ~30s  | None
#   All 4 primaries killed    | StatefulSet recreate   | ~45s  | None (*)
#   Primary + mirror (no PVC) | PVC delete + recreate  | ~60s  | None
#
#   (*) Coordinator remains available; queries fail until segments recover
#
# Expected Results:
#   - Baseline metrics recorded (fts_failover_total, fts_probe_total)
#   - 2 primaries killed simultaneously — both recover in <30s
#   - No FTS failover triggered (K8s self-healing outpaces FTS detection)
#   - Cluster serves queries throughout (INSERT/SELECT succeed)
#   - All 9 segments status='u', mode='s' after recovery
#   - Primary-3 AND mirror-3 killed — both recover in <30s
#   - Data integrity maintained: 400,006+ orders accessible
#   - Cluster phase=Running, mirroringStatus=InSync after all tests
#
# Metrics to verify:
#   - cloudberry_fts_failover_total: unchanged during cascading failures
#   - cloudberry_fts_probe_total{result="success"}: increases over time
#   - cloudberry_fts_probe_total{result="degraded"}: unchanged if recovery is fast
#   - cloudberry_mirroring_in_sync = 1 (cluster stays synchronized)
#   - cloudberry_segment_status{segment="N"} = 1 for all segments
#   - cloudberry_fts_probe_duration_seconds: most probes complete in <100ms
#
# Note: cloudberry_segments_failed gauge may remain stale at 1 after recovery
# because updateFTSProbeStatus() only calls SetSegmentsFailed() in the degraded
# path but does not reset it to 0 in the healthy path. The authoritative source
# is status.failedSegments=[] which is always correct.
#
apiVersion: avsoft.io/v1alpha1
kind: CloudberryCluster
metadata:
  name: scenario19-cluster
  namespace: cloudberry-test
spec:
  image: "cloudberrydb/cloudberry:2.1.0"
  version: "2.1.0"
  coordinator:
    resources:
      requests:
        cpu: "250m"
        memory: "512Mi"
      limits:
        cpu: "1"
        memory: "2Gi"
    storage:
      size: "5Gi"
    port: 5432
  standby:
    enabled: false
  segments:
    count: 4
    primariesPerHost: 2
    mirroring:
      enabled: true
      layout: group
    resources:
      requests:
        cpu: "250m"
        memory: "512Mi"
      limits:
        cpu: "1"
        memory: "2Gi"
    storage:
      size: "5Gi"
  config:
    parameters:
      max_connections: "200"
      shared_buffers: "2GB"
  ha:
    ftsProbeInterval: 5
    ftsProbeTimeout: 2
    ftsProbeRetries: 2
  deletionPolicy: Retain
