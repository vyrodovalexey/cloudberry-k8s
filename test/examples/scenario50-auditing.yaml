apiVersion: avsoft.io/v1alpha1
kind: CloudberryCluster
metadata:
  name: scenario50-audit
  namespace: cloudberry-test
spec:
  version: "2.1.0"
  image: "cloudberrydb/cloudberry:2.1.0"
  coordinator:
    resources:
      requests:
        cpu: "250m"
        memory: "512Mi"
    storage:
      size: "5Gi"
    port: 5432
  segments:
    count: 2
    storage:
      size: "5Gi"
  config:
    parameters:
      log_connections: "on"
      log_disconnections: "on"
      log_statement: "ddl"
      log_min_duration_statement: "1000"
      log_duration: "on"
  deletionPolicy: Retain
