apiVersion: avsoft.io/v1alpha1
kind: CloudberryCluster
metadata:
  name: scenario45-hba-defaults
  namespace: cloudberry-test
spec:
  version: "2.1.0"
  image: "cloudberrydb/cloudberry:2.1.0"
  coordinator:
    resources:
      requests:
        cpu: "250m"
        memory: "512Mi"
    storage:
      size: "5Gi"
    port: 5432
  segments:
    count: 2
    storage:
      size: "5Gi"
  # NOTE: No auth.hbaRules specified — operator should generate defaults
  deletionPolicy: Retain
