# Scenario 36: Per-Tablespace I/O Limits
#
# This example shows a CloudberryCluster with per-tablespace I/O limits
# configured on resource groups. The io_limit feature allows fine-grained
# control over disk I/O bandwidth and IOPS per tablespace.
#
# LIMITATION: Cloudberry 2.1.0 requires gp_resource_manager=group for io_limit.
# Clusters running in queue mode will reject ALTER RESOURCE GROUP ... SET io_limit
# with: "ERROR: resource group must be enabled to use io limit feature"
#
# SQL generated by the operator:
#   ALTER RESOURCE GROUP "analytics" SET io_limit
#     'fast_storage:rbps=209715200:wbps=104857600:riops=5000:wiops=2500;*:rbps=52428800:wbps=26214400:riops=500:wiops=250'
apiVersion: avsoft.io/v1alpha1
kind: CloudberryCluster
metadata:
  name: scenario36-io-limits
spec:
  version: "2.1.0"
  workload:
    enabled: true
    resourceGroups:
      - name: analytics
        concurrency: 10
        cpuMaxPercent: 50
        cpuWeight: 100
        ioLimits:
          - tablespace: "fast_storage"
            readBytesPerSec: 209715200   # 200 MB/s
            writeBytesPerSec: 104857600  # 100 MB/s
            readIOPS: 5000
            writeIOPS: 2500
          - tablespace: "*"
            readBytesPerSec: 52428800    # 50 MB/s
            writeBytesPerSec: 26214400   # 25 MB/s
            readIOPS: 500
            writeIOPS: 250
