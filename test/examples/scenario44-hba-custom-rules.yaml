apiVersion: avsoft.io/v1alpha1
kind: CloudberryCluster
metadata:
  name: scenario44-hba-custom
  namespace: cloudberry-test
spec:
  version: "2.1.0"
  image: "cloudberrydb/cloudberry:2.1.0"
  coordinator:
    resources:
      requests:
        cpu: "250m"
        memory: "512Mi"
    storage:
      size: "5Gi"
    port: 5432
  segments:
    count: 2
    storage:
      size: "5Gi"
  auth:
    hbaRules:
      - type: local
        database: all
        user: gpadmin
        method: trust
      - type: host
        database: all
        user: all
        address: "10.0.0.0/8"
        method: scram-sha-256
      - type: hostssl
        database: all
        user: all
        address: "192.168.0.0/16"
        method: scram-sha-256
      - type: host
        database: all
        user: all
        address: "0.0.0.0/0"
        method: reject
  deletionPolicy: Retain
