# Scenario 16: Cluster Deletion with Both Policies
#
# This scenario tests two deletion policies:
# - 16a: deletionPolicy=Retain (PVCs are preserved after cluster deletion)
# - 16b: deletionPolicy=Delete (PVCs are removed along with the cluster)
#
# Prerequisites:
# - A running CloudberryCluster (scenario1-cluster) with deletionPolicy=Retain
# - Operator deployed in cloudberry-test namespace
#
# Expected Results:
# - 16a: CR, StatefulSets, Services, ConfigMaps, Pods deleted; PVCs retained
# - 16b: All resources including PVCs deleted
---
# 16a: Cluster with Retain policy (default from scenario1-cluster.yaml)
# Delete with: kubectl delete cloudberrycluster scenario1-cluster -n cloudberry-test
# Verify PVCs retained: kubectl get pvc -n cloudberry-test -l app.kubernetes.io/managed-by=cloudberry-operator
---
# 16b: Cluster with Delete policy
apiVersion: avsoft.io/v1alpha1
kind: CloudberryCluster
metadata:
  name: scenario1-cluster
  namespace: cloudberry-test
spec:
  image: "cloudberrydb/cloudberry:2.1.0"
  version: "2.1.0"
  coordinator:
    resources:
      requests:
        cpu: "250m"
        memory: "512Mi"
      limits:
        cpu: "1"
        memory: "2Gi"
    storage:
      size: "5Gi"
    port: 5432
  standby:
    enabled: true
    resources:
      requests:
        cpu: "250m"
        memory: "512Mi"
      limits:
        cpu: "1"
        memory: "2Gi"
    storage:
      size: "5Gi"
  segments:
    count: 4
    primariesPerHost: 2
    mirroring:
      enabled: true
      layout: "group"
    resources:
      requests:
        cpu: "250m"
        memory: "512Mi"
      limits:
        cpu: "1"
        memory: "2Gi"
    storage:
      size: "5Gi"
  config:
    parameters:
      max_connections: "200"
      shared_buffers: "2GB"
  ha:
    ftsProbeInterval: 60
    ftsProbeTimeout: 5
    ftsProbeRetries: 3
  deletionPolicy: Delete
  backupOnDelete: false
