apiVersion: avsoft.io/v1alpha1
kind: CloudberryCluster
metadata:
  name: scenario1-cluster
  namespace: cloudberry-test
spec:
  image: "cloudberrydb/cloudberry:2.1.0"
  version: "2.1.0"
  coordinator:
    resources:
      requests:
        cpu: "250m"
        memory: "512Mi"
      limits:
        cpu: "1"
        memory: "2Gi"
    storage:
      size: "5Gi"
    port: 5432
  standby:
    enabled: true
    resources:
      requests:
        cpu: "250m"
        memory: "512Mi"
      limits:
        cpu: "1"
        memory: "2Gi"
    storage:
      size: "5Gi"
  segments:
    count: 4
    primariesPerHost: 2
    mirroring:
      enabled: true
      layout: "group"
    resources:
      requests:
        cpu: "250m"
        memory: "512Mi"
      limits:
        cpu: "1"
        memory: "2Gi"
    storage:
      size: "5Gi"
  config:
    parameters:
      max_connections: "200"
      shared_buffers: "2GB"
      gp_enable_global_deadlock_detector: "on"
    coordinatorParameters:
      log_min_duration_statement: "500"
    databaseParameters:
      mydb:
        work_mem: "256MB"
    roleParameters:
      analyst:
        statement_mem: "1GB"
  ha:
    ftsProbeInterval: 60
    ftsProbeTimeout: 5
    ftsProbeRetries: 3
  deletionPolicy: Retain
  backupOnDelete: true
