# Scenario 23: FTS Configuration Tuning Under Load
#
# This scenario tests the Fault Tolerance Service (FTS) probe configuration
# tuning while the cluster is under moderate query load. It validates that
# tighter FTS parameters (shorter intervals, lower timeouts) do not cause
# false positive failovers, and that the system correctly detects real failures
# with the adjusted configuration.
#
# Prerequisites:
#   - Scenario 19 cluster running with mirrors (9 pods: 1 coord + 4 pri + 4 mir)
#   - All segments status='u', mode='s' (up and synced)
#   - Cluster phase=Running, mirroringStatus=InSync
#   - Current HA config: ftsProbeInterval=10, ftsProbeRetries=2, ftsProbeTimeout=5
#   - Test data loaded (orders + customers tables from scenario 7)
#
# FTS Configuration Parameters:
#   - ftsProbeInterval: How often (seconds) the operator runs FTS health probes
#   - ftsProbeTimeout: Maximum time (seconds) to wait for a probe response
#   - ftsProbeRetries: Number of consecutive probe failures before declaring degraded
#
# Test Flow:
#
#   Step 1: Record baseline metrics
#     kubectl port-forward -n cloudberry-test deployment/cloudberry-operator 18096:8080
#     curl -s http://localhost:18096/metrics | grep "cloudberry_fts_probe_total"
#     curl -s http://localhost:18096/metrics | grep "cloudberry_fts_failover_total"
#     # Record fts_probe_total and fts_failover_total as baseline
#
#   Step 2: Generate moderate query load
#     # Start 3 background query sessions with JOINs, aggregations, and pg_sleep
#     for j in $(seq 1 3); do
#       kubectl exec -n cloudberry-test scenario19-cluster-coordinator-0 -- \
#         /usr/local/cloudberry-db/bin/psql -U gpadmin -d mydb -c "
#           SELECT count(*) FROM orders o JOIN customers c ON o.customer_id = c.id;
#           SELECT customer_id, sum(amount) FROM orders GROUP BY customer_id
#             ORDER BY sum(amount) DESC LIMIT 10;
#           SELECT pg_sleep(120);
#         " &
#     done
#     # This creates CPU and I/O pressure on all segments
#
#   Step 3: Apply tighter FTS configuration
#     kubectl patch cloudberrycluster scenario19-cluster -n cloudberry-test \
#       --type=merge -p '{
#         "spec": {
#           "ha": {
#             "ftsProbeInterval": 5,
#             "ftsProbeTimeout": 2,
#             "ftsProbeRetries": 2
#           }
#         }
#       }'
#     # Detection window: interval(5s) + retries(2) × timeout(2s) = ~9s max
#     # vs original: interval(10s) + retries(2) × timeout(5s) = ~20s max
#
#   Step 4: Wait 60 seconds and verify probe frequency increased
#     # Collect metrics after 60s
#     # Expected: ~12 probes with 5s interval (60/5)
#     # Key check: fts_failover_total should NOT increase (no false positives)
#     # The operator runs FTS probes as part of its reconciliation loop
#     # Actual probe frequency depends on reconciliation interval (~30s)
#
#   Step 5: Verify cluster still healthy (no spurious failovers)
#     kubectl get cloudberrycluster scenario19-cluster -n cloudberry-test \
#       -o jsonpath='{.status.phase} {.status.mirroringStatus}'
#     # Expected: Running InSync
#     kubectl exec -n cloudberry-test scenario19-cluster-coordinator-0 -- \
#       /usr/local/cloudberry-db/bin/psql -U gpadmin -d postgres -t -c \
#       "SELECT count(*) FROM gp_segment_configuration WHERE status='u';"
#     # Expected: 9 segments up
#
#   Step 6: Boundary test — kill primary-3 to test tight FTS detection
#     # Record degraded probe count before
#     # Force-delete primary-3
#     kubectl delete pod scenario19-cluster-segment-primary-3 \
#       -n cloudberry-test --grace-period=0 --force
#     # Monitor mirroringStatus every 2s for up to 40s
#     # With tight config, degradation should be detected in <15s
#     # Note: If Kubernetes recreates the pod faster than the probe cycle,
#     #   the FTS may not detect degradation at all — this is expected behavior
#     #   and demonstrates that K8s self-healing can outpace FTS detection
#     # Wait for pod recovery and InSync restoration
#
#   Step 7: Restore original FTS configuration
#     kubectl patch cloudberrycluster scenario19-cluster -n cloudberry-test \
#       --type=merge -p '{
#         "spec": {
#           "ha": {
#             "ftsProbeInterval": 60,
#             "ftsProbeTimeout": 5,
#             "ftsProbeRetries": 3
#           }
#         }
#       }'
#
#   Step 8: Kill background queries and verify final state
#     kill $(jobs -p)
#     kubectl get cloudberrycluster scenario19-cluster -n cloudberry-test
#     kubectl exec -n cloudberry-test scenario19-cluster-coordinator-0 -- \
#       /usr/local/cloudberry-db/bin/psql -U gpadmin -d mydb -c \
#       "SELECT count(*) FROM orders;"
#
# Key Observations:
#   - Tighter FTS timeouts (2s) under moderate query load do NOT cause false
#     positive failovers. The probes complete well within the timeout even when
#     the cluster is processing JOINs and aggregations across all segments.
#   - The FTS probe runs as part of the operator's reconciliation loop, so the
#     actual probe frequency is governed by the reconciliation interval (~30s),
#     not solely by ftsProbeInterval. The ftsProbeInterval sets the minimum
#     interval between probes within the reconciliation cycle.
#   - When a pod is force-deleted, Kubernetes StatefulSet controller recreates
#     it very quickly (~8s). If the pod recovers before the next FTS probe cycle,
#     the degradation is never detected — this is correct behavior showing that
#     K8s self-healing complements FTS monitoring.
#   - The ftsProbeTimeout should be set considering network latency and segment
#     response time under load. A timeout of 2s is safe for local/single-node
#     clusters but may need to be higher for multi-node production deployments.
#   - ftsProbeRetries=2 with tight timeouts provides a good balance between
#     fast detection and avoiding false positives from transient network issues.
#
# FTS Tuning Guidelines:
#   Environment     | Interval | Timeout | Retries | Detection Window
#   --------------- | -------- | ------- | ------- | ----------------
#   Development     |    60s   |    5s   |    3    | ~75s (relaxed)
#   Staging         |    10s   |    5s   |    2    | ~20s (moderate)
#   Production      |     5s   |    3s   |    3    | ~14s (balanced)
#   Low-latency     |     5s   |    2s   |    2    | ~9s  (aggressive)
#
# Warning: Setting ftsProbeTimeout too low (<2s) in high-latency environments
# or under heavy I/O load may cause false positive failovers. Always test
# configuration changes under representative load before applying to production.
#
# Expected Results:
#   - Baseline metrics recorded (fts_probe_total, fts_failover_total)
#   - 3 background query sessions running during FTS config change
#   - FTS config updated to interval=5s, timeout=2s, retries=2
#   - No false positive failovers (fts_failover_total unchanged)
#   - All 9 segments remain up throughout the test
#   - Cluster stays Running/InSync during config tuning
#   - Pod kill detected or self-healed before detection
#   - FTS config restored to production defaults
#   - All data intact (orders count unchanged)
#
# Metrics to verify:
#   - cloudberry_fts_probe_total: increases over time (probe cycles running)
#   - cloudberry_fts_failover_total: unchanged during normal load (no false positives)
#   - cloudberry_fts_probe_duration_seconds: histogram shows probe latency
#   - cloudberry_mirroring_in_sync = 1 (cluster stays synchronized)
#   - cloudberry_fts_probe_total{result="degraded"}: unchanged if pod recovers fast
#
apiVersion: avsoft.io/v1alpha1
kind: CloudberryCluster
metadata:
  name: scenario19-cluster
  namespace: cloudberry-test
spec:
  image: "cloudberrydb/cloudberry:2.1.0"
  version: "2.1.0"
  coordinator:
    resources:
      requests:
        cpu: "250m"
        memory: "512Mi"
      limits:
        cpu: "1"
        memory: "2Gi"
    storage:
      size: "5Gi"
    port: 5432
  standby:
    enabled: false
  segments:
    count: 4
    primariesPerHost: 2
    mirroring:
      enabled: true
      layout: group
    resources:
      requests:
        cpu: "250m"
        memory: "512Mi"
      limits:
        cpu: "1"
        memory: "2Gi"
    storage:
      size: "5Gi"
  config:
    parameters:
      max_connections: "200"
      shared_buffers: "2GB"
  # Tight FTS configuration for testing (restore to defaults after test)
  # Default/production values: interval=60, timeout=5, retries=3
  ha:
    ftsProbeInterval: 5
    ftsProbeTimeout: 2
    ftsProbeRetries: 2
  deletionPolicy: Retain
