apiVersion: avsoft.io/v1alpha1
kind: CloudberryCluster
metadata:
  name: scenario47a-ssl
  namespace: cloudberry-test
spec:
  version: "2.1.0"
  image: "cloudberrydb/cloudberry:2.1.0"
  coordinator:
    resources:
      requests:
        cpu: "250m"
        memory: "512Mi"
    storage:
      size: "5Gi"
    port: 5432
  segments:
    count: 2
    storage:
      size: "5Gi"
  auth:
    ssl:
      enabled: true
      certSecret:
        name: cloudberry-tls
      minTLSVersion: "1.2"
    hbaRules:
      - type: hostssl
        database: all
        user: all
        address: "0.0.0.0/0"
        method: scram-sha-256
      - type: local
        database: all
        user: gpadmin
        method: trust
  deletionPolicy: Retain
