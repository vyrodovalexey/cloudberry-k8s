# Scenario 20: FTS Failover Detection and Handling
#
# This scenario tests the operator's Fault Tolerance Service (FTS) probe
# mechanism for detecting failed primary segments and initiating failover
# when mirroring is enabled.
#
# Prerequisites:
#   - Scenario 19 cluster running with mirrors deployed as pods
#   - Mirrors registered in gp_segment_configuration
#
# Test Flow:
#   1. Register mirror segments in gp_segment_configuration
#   2. Record baseline FTS metrics
#   3. Simulate primary segment failure (mark segment as down)
#   4. Trigger operator FTS probe via spec change (generation bump)
#   5. Verify operator detects degraded state
#   6. Verify failover initiation and metrics
#   7. Verify cluster status reflects degraded mirroring
#
# Expected Results:
#   - Operator detects segment failure via FTS probe
#   - cloudberry_segment_status{segment="0"} = 0 (down)
#   - cloudberry_mirroring_in_sync = 0
#   - cloudberry_fts_failover_total increments
#   - cloudberry_fts_probe_total{result="degraded"} increments
#   - Cluster mirroringStatus = "Degraded"
#   - Operator logs: "segment is down" and "initiating failover"
#
# Limitations:
#   - Full PostgreSQL-level mirror promotion requires streaming replication
#     to be properly configured (via gpaddmirrors or equivalent)
#   - The operator's HA controller only runs FTS probes on generation changes
#     (spec updates), not on a periodic timer (known design limitation)
#
apiVersion: avsoft.io/v1alpha1
kind: CloudberryCluster
metadata:
  name: scenario19-cluster
  namespace: cloudberry-test
spec:
  image: "cloudberrydb/cloudberry:2.1.0"
  version: "2.1.0"
  coordinator:
    resources:
      requests:
        cpu: "250m"
        memory: "512Mi"
      limits:
        cpu: "1"
        memory: "2Gi"
    storage:
      size: "5Gi"
    port: 5432
  standby:
    enabled: false
  segments:
    count: 4
    primariesPerHost: 2
    mirroring:
      enabled: true
      layout: group
    resources:
      requests:
        cpu: "250m"
        memory: "512Mi"
      limits:
        cpu: "1"
        memory: "2Gi"
    storage:
      size: "5Gi"
  config:
    parameters:
      max_connections: "200"
      shared_buffers: "2GB"
  ha:
    ftsProbeInterval: 10
    ftsProbeTimeout: 5
    ftsProbeRetries: 2
  deletionPolicy: Retain
