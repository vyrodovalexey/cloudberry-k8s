apiVersion: avsoft.io/v1alpha1
kind: CloudberryCluster
metadata:
  name: scenario38-dual-auth
  namespace: cloudberry-test
spec:
  version: "2.1.0"
  image: "cloudberrydb/cloudberry:2.1.0"
  coordinator:
    resources:
      requests:
        cpu: "250m"
        memory: "512Mi"
    storage:
      size: "5Gi"
    port: 5432
  segments:
    count: 2
    storage:
      size: "5Gi"
  auth:
    basic:
      enabled: true
      adminUser: gpadmin
      adminPasswordSecret:
        name: cloudberry-admin-password
        key: password
    oidc:
      enabled: true
      issuerURL: http://keycloak:8090/realms/cloudberry
      clientID: cloudberry-operator
      clientSecret:
        secretRef:
          name: oidc-client-secret
          key: client-secret
      scopes: [openid, profile, email]
      roleClaimPath: "realm_access.roles"
      roleClaimSource: id_token
      roleMatchMode: exact
      roleMapping:
        admin: Admin
        operator: Operator
        operator-basic: "Operator Basic"
        user: Basic
        reader: "Self Only"
      pkce: true
      allowLocalSignIn: true
  deletionPolicy: Retain
