# =============================================================================
# Scenario 121 -- Storage CLI (All 6 Endpoints) Performance
# =============================================================================
#
# Purpose: Measure the operator's storage REST API endpoint latency under
#          CLI-driven load. Scenario 121 added --schema/--table flags to the
#          `storage tables detail` command; the CLI is a thin client over the
#          Scenario 119/120 API endpoints (P.1-P.6). This config exercises all
#          six storage endpoints as the CLI would invoke them, confirming no
#          regression from the flag-resolution changes.
#
# Endpoints exercised (via ammo/scenario121-storage-cli.txt):
#   L.1  GET  /storage/disk-usage
#   L.2  GET  /storage/tables
#   L.3  GET  /storage/tables/{schema}/{table}
#   L.4  GET  /storage/recommendations
#   L.5  POST /storage/recommendations/scan  (request-style ammo)
#   L.6  GET  /storage/usage-report?month=2026-05
#
# Profile: Ramp to 50 RPS over 30s, hold for 2 minutes
# Expected: p95 < 300ms, p99 < 1000ms, error rate < 0.5%
# Duration: ~3 minutes (ramp-up + constant)
#
# NOTE: The storage endpoints require authentication (Basic Auth) and a valid
# cluster name. The ammo file includes Authorization headers. Ensure the
# operator is running with a seeded cluster before testing.
#
# AUTH REQUIREMENT: The GET endpoints require at least PermissionBasic
# (Basic Auth). The POST scan endpoint requires PermissionOperator. The ammo
# file uses admin:admin credentials. Adjust if your deployment uses different
# credentials.
#
# SLO Targets (storage CLI regression check):
#   - p50 latency:  < 100ms
#   - p95 latency:  < 300ms
#   - p99 latency:  < 1000ms
#   - Error rate:   < 0.5%
#
# Usage:
#   ./run-perftest.sh --scenario scenario121
#   ./run-perftest.sh --scenario scenario121 --hey --port-forward
#
# =============================================================================

phantom:
  address: localhost:8190
  ssl: false
  ammo_type: uri
  ammofile: ammo/scenario121-storage-cli.txt
  load_profile:
    load_type: rps
    # Warmup: ramp from 1 to 25 RPS over 30 seconds
    # Ramp: increase from 25 to 50 RPS over 30 seconds
    # Sustain: hold 50 RPS for 2 minutes (120 seconds)
    schedule: line(1, 25, 30s) line(25, 50, 30s) const(50, 120s)
  timeout: 5s
  instances: 100
  connection_test: true
  writelog: all

autostop:
  autostop:
    # Stop if average response time exceeds 2 seconds for 20 seconds
    - time(2000, 20s)
    # Stop if 5xx error rate exceeds 5% for 10 seconds
    - http(5xx, 5%, 10s)
    # Stop if 4xx error rate exceeds 30% for 10 seconds
    - http(4xx, 30%, 10s)
    # Stop if network errors exceed 5% for 10 seconds
    - net(xx, 5%, 10s)
    # Stop if 99th percentile exceeds 3 seconds for 20 seconds
    - quantile(99, 3000, 20s)

console:
  enabled: true
  short_only: false
