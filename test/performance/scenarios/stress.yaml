# =============================================================================
# Stress Test Scenario
# =============================================================================
#
# Purpose: Find the breaking point of the operator API by gradually increasing
#          load until performance degrades or errors appear. This identifies
#          the maximum sustainable throughput and resource bottlenecks.
#
# Profile: Step-wise ramp from 10 to 1000 RPS
# Expected: Identify the RPS threshold where latency/errors spike
# Duration: ~15 minutes
#
# Load Steps:
#   1. Warmup:    10 RPS for 30s
#   2. Step 1:    50 RPS for 120s
#   3. Step 2:   100 RPS for 120s
#   4. Step 3:   200 RPS for 120s
#   5. Step 4:   500 RPS for 120s
#   6. Step 5:  1000 RPS for 120s
#
# Usage:
#   ./run-perftest.sh --scenario stress
#
# =============================================================================

phantom:
  address: localhost:8443
  ssl: false
  ammo_type: uri
  ammofile: ammo/api-read.txt
  load_profile:
    load_type: rps
    # Step-wise load increase to find breaking point
    schedule: >
      line(1, 10, 15s)
      const(10, 30s)
      line(10, 50, 15s)
      const(50, 120s)
      line(50, 100, 15s)
      const(100, 120s)
      line(100, 200, 15s)
      const(200, 120s)
      line(200, 500, 15s)
      const(500, 120s)
      line(500, 1000, 15s)
      const(1000, 120s)
  timeout: 10000
  instances: 2000
  connection_test: true
  writelog: all

autostop:
  autostop:
    # More lenient thresholds - we want to find the breaking point
    # Stop if average response time exceeds 5 seconds for 30 seconds
    - time(5000, 30s)
    # Stop if 5xx error rate exceeds 30% for 20 seconds
    - http(5xx, 30%, 20s)
    # Stop if network errors exceed 20% for 15 seconds
    - net(xx, 20%, 15s)
    # Stop if 99th percentile exceeds 10 seconds for 30 seconds
    - quantile(99, 10000, 30s)
    # Stop if total 5xx count exceeds 2000 in 60 seconds
    - total_http(5xx, 2000, 60s)

console:
  enabled: true
  short_only: false
