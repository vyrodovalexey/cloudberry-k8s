# =============================================================================
# Scenario 120 -- Usage Report (Per-Table Enrichment) Performance
# =============================================================================
#
# Purpose: Measure the operator's P.6 GET /storage/usage-report endpoint
#          latency under load after Scenario 120 enriched the response with
#          per-table consumption (db.UsageReportEntry.Tables / db.TableUsage).
#          Confirms the C.11 per-table breakdown does not regress the
#          operator's response time compared to the Scenario 119 baseline.
#
# Profile: Ramp to 50 RPS over 30s, hold for 2 minutes
# Expected: p95 < 300ms, p99 < 1000ms, error rate < 0.5%
# Duration: ~3 minutes (ramp-up + constant)
#
# NOTE: The usage-report endpoint requires authentication (Basic Auth) and a
# valid cluster name. The ammo file includes Authorization headers. Ensure the
# operator is running with a seeded cluster before testing.
#
# AUTH REQUIREMENT: The GET endpoint requires at least PermissionBasic
# (Basic Auth). The ammo file uses admin:admin credentials. Adjust if your
# deployment uses different credentials.
#
# SLO Targets (usage-report regression check):
#   - p50 latency:  < 100ms
#   - p95 latency:  < 300ms
#   - p99 latency:  < 1000ms
#   - Error rate:   < 0.5%
#
# Usage:
#   ./run-perftest.sh --scenario scenario120
#   ./run-perftest.sh --scenario scenario120 --hey --port-forward
#
# =============================================================================

phantom:
  address: localhost:8190
  ssl: false
  ammo_type: uri
  ammofile: ammo/scenario120-usage-report.txt
  load_profile:
    load_type: rps
    # Warmup: ramp from 1 to 25 RPS over 30 seconds
    # Ramp: increase from 25 to 50 RPS over 30 seconds
    # Sustain: hold 50 RPS for 2 minutes (120 seconds)
    schedule: line(1, 25, 30s) line(25, 50, 30s) const(50, 120s)
  timeout: 5s
  instances: 100
  connection_test: true
  writelog: all

autostop:
  autostop:
    # Stop if average response time exceeds 2 seconds for 20 seconds
    - time(2000, 20s)
    # Stop if 5xx error rate exceeds 5% for 10 seconds
    - http(5xx, 5%, 10s)
    # Stop if 4xx error rate exceeds 30% for 10 seconds
    - http(4xx, 30%, 10s)
    # Stop if network errors exceed 5% for 10 seconds
    - net(xx, 5%, 10s)
    # Stop if 99th percentile exceeds 3 seconds for 20 seconds
    - quantile(99, 3000, 20s)

console:
  enabled: true
  short_only: false
