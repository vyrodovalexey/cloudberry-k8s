# =============================================================================
# Scenario 87 — Cross-Cluster Migration: Read-Polling Performance Test
# =============================================================================
#
# Purpose: Validate the operator API performance under the READ-heavy polling
#          pattern that a migration operator (or cloudberry-ctl) drives during
#          and around a cross-cluster migration (POST /clusters/{name}/migrate).
#
#          The /migrate endpoint itself is stateful and Admin-gated (creates a
#          coordinated backup+restore+validate Job), so it is NOT a high-RPS
#          target. This scenario focuses on the READ endpoints an operator polls
#          while a migration is in progress:
#            - GET /api/v1alpha1/clusters/{name}          (cluster status)
#            - GET /api/v1alpha1/clusters/{name}/backups   (backup list)
#            - GET /api/v1alpha1/clusters/{name}/backups/jobs (job statuses)
#          These are the endpoints that see sustained load during migration
#          monitoring loops (typically 1-5 RPS per endpoint, multiplied by
#          the number of concurrent migrations/operators polling).
#
# Profile: Ramp from 1 to 50 RPS over 30s, hold 50 RPS for 120s
#          This models ~10 concurrent migration watchers polling every 2-3s.
# Expected: p95 < 300ms, p99 < 1000ms, error rate < 0.5%
# Duration: ~3 minutes (ramp-up + constant)
#
# SLO Targets:
#   - Availability: >= 99.5%
#   - p50 latency:  < 100ms
#   - p95 latency:  < 300ms
#   - p99 latency:  < 1000ms
#   - Error rate:   < 0.5%
#
# How to run:
#   1. Port-forward the operator REST API to localhost:8190:
#        kubectl port-forward -n cloudberry-test svc/cloudberry-operator 8190:8090
#   2. (Optional) Obtain an OIDC bearer token if the endpoints require auth:
#        export OIDC_TOKEN=$(curl -sS -X POST \
#          http://127.0.0.1:8090/realms/test/protocol/openid-connect/token \
#          -d grant_type=password -d client_id=cloudberry-operator \
#          -d client_secret=some-secret -d username=adminuser \
#          -d password=adminpass -d scope=openid | jq -r .access_token)
#   3. Run via Docker (from test/performance/):
#        docker run --rm -v $(pwd):/var/loadtest \
#          -v $(pwd)/.yandextank:/tmp/artifacts \
#          --net host direvius/yandex-tank \
#          -c scenarios/scenario87-migration.yaml
#   4. Or via the runner script:
#        ./run-perftest.sh --scenario scenario87
#
# =============================================================================

phantom:
  address: localhost:8190
  ssl: false
  ammo_type: uri
  ammofile: ammo/scenario87-migration-read.txt
  load_profile:
    load_type: rps
    # Warmup: ramp from 1 to 50 RPS over 30 seconds
    # Sustain: hold 50 RPS for 120 seconds (2 minutes)
    # Rationale: migration polling is moderate-rate; 50 RPS models ~10
    # concurrent watchers each polling 3 endpoints every ~2s.
    schedule: line(1, 50, 30s) const(50, 120s)
  timeout: 5s
  instances: 100
  connection_test: true
  writelog: all

autostop:
  autostop:
    # Stop if average response time exceeds 2 seconds for 30 seconds
    - time(2000, 30s)
    # Stop if 5xx error rate exceeds 5% for 15 seconds
    - http(5xx, 5%, 15s)
    # Stop if 4xx error rate exceeds 30% for 15 seconds
    - http(4xx, 30%, 15s)
    # Stop if network errors exceed 3% for 10 seconds
    - net(xx, 3%, 10s)
    # Stop if 99th percentile exceeds 3 seconds for 30 seconds
    - quantile(99, 3000, 30s)
    # Stop if total 5xx count exceeds 200 in 60 seconds
    - total_http(5xx, 200, 60s)

console:
  enabled: true
  short_only: false
