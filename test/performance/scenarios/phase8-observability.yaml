# =============================================================================
# Phase 8 - Observability Validation Performance Test
# =============================================================================
#
# Purpose: Validate that the new observability metrics (api_request_duration_seconds,
#          api_requests_total, db_query_duration_seconds, auth_attempts_total,
#          api_requests_in_flight) react correctly under load.
#
# Profile: Ramp 1->50 RPS over 30s, hold 50 RPS for 90s
# Expected: p99 < 500ms, error rate < 2%
# Duration: ~2.5 minutes
#
# Endpoints tested (READ-only, safe):
#   - GET /api/v1alpha1/clusters
#   - GET /api/v1alpha1/clusters/acceptance-test
#   - GET /api/v1alpha1/clusters/acceptance-test/status
#   - GET /api/v1alpha1/clusters/acceptance-test/segments
#   - GET /api/v1alpha1/clusters/acceptance-test/config
#   - GET /api/v1alpha1/clusters/acceptance-test/mirroring
#   - GET /api/v1alpha1/clusters/acceptance-test/standby
#
# =============================================================================

phantom:
  address: localhost:18090
  ssl: false
  ammo_type: uri
  ammofile: ammo/phase8-api-read.txt
  load_profile:
    load_type: rps
    # Warmup ramp: 1 to 50 RPS over 30 seconds
    # Sustain: 50 RPS for 90 seconds
    schedule: line(1, 50, 30s) const(50, 90s)
  timeout: 5s
  instances: 50
  connection_test: true
  writelog: all

autostop:
  autostop:
    # Stop if average response time exceeds 2 seconds for 15 seconds
    - time(2000, 15s)
    # Stop if 5xx error rate exceeds 5% for 10 seconds
    - http(5xx, 5%, 10s)
    # Stop if 4xx error rate exceeds 30% for 10 seconds
    - http(4xx, 30%, 10s)
    # Stop if network errors exceed 3% for 10 seconds
    - net(xx, 3%, 10s)
    # Stop if 99th percentile exceeds 3 seconds for 15 seconds
    - quantile(99, 3000, 15s)

console:
  enabled: true
  short_only: false
