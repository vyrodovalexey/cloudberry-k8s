# =============================================================================
# Scenario 88 — Backup Disabled / No Schedule: Read-Polling Performance Test
# =============================================================================
#
# Purpose: Validate the operator API performance under the READ-heavy polling
#          pattern that an operator/CLI drives when observing backup
#          enabled/disabled state and schedule configuration.
#
#          Scenario 88 is a control-plane/config scenario (backup enable/disable,
#          empty schedule). The mutating operations are infrequent admin actions,
#          so this scenario focuses on the READ endpoints that tooling polls to
#          observe the current backup and schedule state:
#            - GET /api/v1alpha1/clusters/{name}/backups          (list — enabled field)
#            - GET /api/v1alpha1/clusters/{name}/backups/schedule  (scheduled/enabled)
#            - GET /api/v1alpha1/clusters/{name}                   (cluster status)
#          These are the endpoints that see sustained load from monitoring loops
#          and dashboards (typically 1-5 RPS per endpoint, multiplied by the
#          number of concurrent watchers/dashboards polling).
#
# Profile: Ramp from 1 to 40 RPS over 30s, hold 40 RPS for 120s
#          This models ~8 concurrent watchers polling every 2-3s.
#          Slightly lower than scenario87 because backup-status polling is
#          lighter than migration monitoring (fewer concurrent operations).
# Expected: p95 < 300ms, p99 < 1000ms, error rate < 0.5%
# Duration: ~2.5 minutes (ramp-up + constant)
#
# SLO Targets:
#   - Availability: >= 99.5%
#   - p50 latency:  < 100ms
#   - p95 latency:  < 300ms
#   - p99 latency:  < 1000ms
#   - Error rate:   < 0.5%
#
# How to run:
#   1. Port-forward the operator REST API to localhost:8190:
#        kubectl port-forward -n cloudberry-test svc/cloudberry-operator 8190:8090
#   2. (Optional) Obtain an OIDC bearer token if the endpoints require auth:
#        export OIDC_TOKEN=$(curl -sS -X POST \
#          http://127.0.0.1:8090/realms/test/protocol/openid-connect/token \
#          -d grant_type=password -d client_id=cloudberry-operator \
#          -d client_secret=some-secret -d username=adminuser \
#          -d password=adminpass -d scope=openid | jq -r .access_token)
#   3. Run via Docker (from test/performance/):
#        docker run --rm -v $(pwd):/var/loadtest \
#          -v $(pwd)/.yandextank:/tmp/artifacts \
#          --net host direvius/yandex-tank \
#          -c scenarios/scenario88-backup-status.yaml
#   4. Or via the runner script:
#        ./run-perftest.sh --scenario scenario88
#
# =============================================================================

phantom:
  address: localhost:8190
  ssl: false
  ammo_type: uri
  ammofile: ammo/scenario88-backup-status-read.txt
  load_profile:
    load_type: rps
    # Warmup: ramp from 1 to 40 RPS over 30 seconds
    # Sustain: hold 40 RPS for 120 seconds (2 minutes)
    # Rationale: backup-status polling is a config/control-plane scenario;
    # 40 RPS models ~8 concurrent watchers each polling 3 endpoints every ~2s.
    schedule: line(1, 40, 30s) const(40, 120s)
  timeout: 5s
  instances: 100
  connection_test: true
  writelog: all

autostop:
  autostop:
    # Stop if average response time exceeds 2 seconds for 30 seconds
    - time(2000, 30s)
    # Stop if 5xx error rate exceeds 5% for 15 seconds
    - http(5xx, 5%, 15s)
    # Stop if 4xx error rate exceeds 30% for 15 seconds
    - http(4xx, 30%, 15s)
    # Stop if network errors exceed 3% for 10 seconds
    - net(xx, 3%, 10s)
    # Stop if 99th percentile exceeds 3 seconds for 30 seconds
    - quantile(99, 3000, 30s)
    # Stop if total 5xx count exceeds 200 in 60 seconds
    - total_http(5xx, 200, 60s)

console:
  enabled: true
  short_only: false
