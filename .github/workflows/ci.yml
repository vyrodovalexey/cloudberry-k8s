name: CI

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - main

# Concurrency control - cancel in-progress runs for the same branch/tag
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  GO_VERSION: '1.26.3'
  GOLANGCI_LINT_VERSION: 'v2.12.2'
  DOCKER_REGISTRY: ghcr.io
  DOCKER_IMAGE_OPERATOR: ghcr.io/${{ github.repository }}-operator
  DOCKER_IMAGE_CTL: ghcr.io/${{ github.repository }}-ctl
  HELM_CHART_PATH: deploy/helm/cloudberry-operator

jobs:
  # ===========================================================================
  # Parallel Jobs: Lint, Vulnerability Check, Unit Tests, Functional Tests
  # ===========================================================================

  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Go
        uses: actions/setup-go@7a3fe6cf4cb3a834922a1244abfce67bcef6a0c5 # v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@1e7e51e771db61008b38414a730f564565cf7c20 # v9.2.0
        with:
          version: ${{ env.GOLANGCI_LINT_VERSION }}
          args: --timeout=5m

  govulncheck:
    name: Vulnerability Check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Go
        uses: actions/setup-go@7a3fe6cf4cb3a834922a1244abfce67bcef6a0c5 # v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Run govulncheck
        run: govulncheck ./...

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Go
        uses: actions/setup-go@7a3fe6cf4cb3a834922a1244abfce67bcef6a0c5 # v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Run unit tests with coverage
        run: |
          mkdir -p coverage
          go test -race -coverprofile=coverage/unit.out -covermode=atomic ./internal/... ./cmd/... ./api/...

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@671740ac38dd9b0130fbe1cec585b89eea48d3de # v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage/unit.out
          flags: unit
          name: unit-tests
          fail_ci_if_error: false
          verbose: true

      - name: Upload coverage artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: coverage-unit
          path: coverage/unit.out
          retention-days: 7

  functional-tests:
    name: Functional Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    services:
      # Vault for secrets management
      vault:
        image: hashicorp/vault:1.17
        ports:
          - 8200:8200
        env:
          VAULT_DEV_ROOT_TOKEN_ID: myroot
          VAULT_DEV_LISTEN_ADDRESS: 0.0.0.0:8200

      # Keycloak DB
      keycloakdb:
        image: postgres:16
        ports:
          - 5432:5432
        env:
          POSTGRES_DB: keycloak
          POSTGRES_USER: keycloak
          POSTGRES_PASSWORD: password

      keycloak:
        image: vyrodovalexey/keycloak-test:26.5
        env:
          KC_DB: postgres
          KC_DB_URL: jdbc:postgresql://keycloakdb:5432/keycloak
          KC_DB_USERNAME: keycloak
          KC_DB_PASSWORD: password
          KC_HOSTNAME: 127.0.0.1
          KC_HTTP_PORT: 8090
          KC_HOSTNAME_STRICT: "false"
          KC_HOSTNAME_STRICT_HTTPS: "false"
          KC_LOG_LEVEL: info
          KC_METRICS_ENABLED: "true"
          KC_HEALTH_ENABLED: "true"
          KEYCLOAK_ADMIN: admin
          KEYCLOAK_ADMIN_PASSWORD: admin
        ports:
          - 8090:8090
          - 8091:9000

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Go
        uses: actions/setup-go@7a3fe6cf4cb3a834922a1244abfce67bcef6a0c5 # v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Wait for services to be ready
        run: |
          echo "Waiting for Vault..."
          for i in {1..30}; do
            if curl -s http://127.0.0.1:8200/v1/sys/health | grep -q '"initialized":true'; then
              echo "Vault is ready!"
              break
            fi
            echo "Attempt $i: Waiting for Vault..."
            sleep 2
          done

          echo "Waiting for Keycloak..."
          for i in {1..60}; do
            if curl -sf http://127.0.0.1:8091/health/ready; then
              echo "Keycloak is ready!"
              break
            fi
            echo "Attempt $i: Waiting for Keycloak..."
            sleep 5
          done

      - name: Setup Vault for Testing
        env:
          VAULT_ADDR: http://127.0.0.1:8200
          VAULT_TOKEN: myroot
        run: bash test/docker-compose/scripts/setup-vault.sh

      - name: Setup Keycloak for Testing
        env:
          KEYCLOAK_ADDR: http://127.0.0.1:8090
        run: bash test/docker-compose/scripts/setup-keycloak.sh

      - name: Run functional tests with coverage
        env:
          TEST_VAULT_ADDR: http://127.0.0.1:8200
          TEST_VAULT_TOKEN: myroot
          TEST_KEYCLOAK_ADDR: http://127.0.0.1:8090
          TEST_KEYCLOAK_REALM: gateway-test
          TEST_KEYCLOAK_CLIENT_ID: gateway
          TEST_KEYCLOAK_CLIENT_SECRET: gateway-secret
        run: |
          mkdir -p coverage
          go test -race -coverprofile=coverage/functional.out -covermode=atomic \
            -tags=functional ./test/functional/...

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@671740ac38dd9b0130fbe1cec585b89eea48d3de # v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage/functional.out
          flags: functional
          name: functional-tests
          fail_ci_if_error: false
          verbose: true

      - name: Upload coverage artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: coverage-functional
          path: coverage/functional.out
          retention-days: 7

  # ===========================================================================
  # Build (PR only)
  # ===========================================================================

  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [lint, govulncheck, unit-tests]
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Go
        uses: actions/setup-go@7a3fe6cf4cb3a834922a1244abfce67bcef6a0c5 # v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Build operator binary
        run: |
          mkdir -p bin
          CGO_ENABLED=0 go build -ldflags="-s -w" -o bin/cloudberry-operator ./cmd/operator/

      - name: Build cloudberry-ctl binary
        run: |
          CGO_ENABLED=0 go build -ldflags="-s -w" -o bin/cloudberry-ctl ./cmd/cloudberry-ctl/

      - name: Verify binaries
        run: ls -la ./bin/

      - name: Upload binary artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: binaries
          path: |
            bin/cloudberry-operator
            bin/cloudberry-ctl
          retention-days: 7

  # ===========================================================================
  # Docker Build (PR only - no push)
  # ===========================================================================

  docker-build:
    name: Docker Build (PR)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [build]
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      packages: read
    strategy:
      matrix:
        include:
          - name: operator
            dockerfile: Dockerfile
            image_env: DOCKER_IMAGE_OPERATOR
          - name: ctl
            dockerfile: Dockerfile.ctl
            image_env: DOCKER_IMAGE_CTL
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        with:
          images: ${{ env[matrix.image_env] }}
          tags: |
            type=ref,event=pr
            type=sha,prefix=pr-

      - name: Build Docker image (no push)
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: ./${{ matrix.dockerfile }}
          push: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ github.sha }}
            COMMIT=${{ github.sha }}
            BUILD_DATE=${{ github.event.head_commit.timestamp }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ===========================================================================
  # Helm Lint (PR)
  # ===========================================================================

  helm-lint:
    name: Helm Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [lint, govulncheck, unit-tests]
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Helm
        uses: azure/setup-helm@1a275c3b69536ee54be43f2070a358922e12c8d4 # v4
        with:
          version: 'v3.14.0'

      - name: Helm lint
        run: helm lint ${{ env.HELM_CHART_PATH }}

      - name: Helm template validation
        run: |
          helm template cloudberry-operator ${{ env.HELM_CHART_PATH }} \
            --set installCRDs=true > /dev/null
          echo "Template validation successful!"

      - name: Helm dry-run install
        run: |
          # Create a kind cluster for dry-run validation
          echo "Skipping dry-run (no cluster available). Lint and template passed."

  # ===========================================================================
  # Tag-only Jobs: Build & Release
  # ===========================================================================

  build-release:
    name: Build & Release
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [lint, govulncheck, unit-tests, functional-tests]
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
      packages: write
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@7a3fe6cf4cb3a834922a1244abfce67bcef6a0c5 # v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Get version
        id: version
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "Building version: ${VERSION}"

      - name: Build operator binaries for multiple platforms
        run: |
          mkdir -p bin
          BUILD_TIME=$(date -u '+%Y-%m-%d_%H:%M:%S')
          for PAIR in "linux/amd64" "linux/arm64" "darwin/amd64" "darwin/arm64"; do
            OS="${PAIR%/*}"
            ARCH="${PAIR#*/}"
            echo "Building cloudberry-operator for ${OS}/${ARCH}..."
            CGO_ENABLED=0 GOOS=${OS} GOARCH=${ARCH} go build \
              -ldflags="-s -w \
                -X main.version=${{ steps.version.outputs.version }} \
                -X main.buildTime=${BUILD_TIME} \
                -X main.gitCommit=${{ github.sha }}" \
              -trimpath \
              -o bin/cloudberry-operator-${OS}-${ARCH} \
              ./cmd/operator/
          done

      - name: Build cloudberry-ctl binaries for multiple platforms
        run: |
          BUILD_TIME=$(date -u '+%Y-%m-%d_%H:%M:%S')
          for PAIR in "linux/amd64" "linux/arm64" "darwin/amd64" "darwin/arm64"; do
            OS="${PAIR%/*}"
            ARCH="${PAIR#*/}"
            echo "Building cloudberry-ctl for ${OS}/${ARCH}..."
            CGO_ENABLED=0 GOOS=${OS} GOARCH=${ARCH} go build \
              -ldflags="-s -w \
                -X main.appVersion=${{ steps.version.outputs.version }} \
                -X main.buildTime=${BUILD_TIME} \
                -X main.gitCommit=${{ github.sha }}" \
              -trimpath \
              -o bin/cloudberry-ctl-${OS}-${ARCH} \
              ./cmd/cloudberry-ctl/
          done

      - name: Create checksums
        run: |
          cd bin
          for f in cloudberry-operator-* cloudberry-ctl-*; do
            sha256sum "$f" > "${f}.sha256"
          done

      - name: Create GitHub Release
        uses: softprops/action-gh-release@a06a81a03ee405af7f2048a818ed3f03bbf83c7b # v2
        with:
          name: Release ${{ steps.version.outputs.version }}
          draft: false
          prerelease: ${{ contains(steps.version.outputs.version, '-') }}
          generate_release_notes: true
          files: |
            bin/cloudberry-operator-*
            bin/cloudberry-ctl-*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload binary artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: release-binaries
          path: bin/
          retention-days: 30

  # ===========================================================================
  # Tag-only Jobs: Docker Build & Push
  # ===========================================================================

  docker-build-push:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [lint, govulncheck, unit-tests, functional-tests]
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: read
      packages: write
      id-token: write
    strategy:
      matrix:
        include:
          - name: operator
            dockerfile: Dockerfile
            image_key: DOCKER_IMAGE_OPERATOR
          - name: ctl
            dockerfile: Dockerfile.ctl
            image_key: DOCKER_IMAGE_CTL
    outputs:
      operator-digest: ${{ steps.build.outputs.digest }}
      operator-tag: ${{ steps.meta.outputs.version }}
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up QEMU
        uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          registry: ${{ env.DOCKER_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        with:
          images: ${{ env[matrix.image_key] }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha,prefix=
            type=raw,value=latest

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: ./${{ matrix.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ steps.meta.outputs.version }}
            COMMIT=${{ github.sha }}
            BUILD_DATE=${{ github.event.head_commit.timestamp }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Install Cosign
        uses: sigstore/cosign-installer@faadad0cce49287aee09b3a48701e75088a2c6ad # v3.7.0

      - name: Sign container image with Cosign
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
          TAGS: ${{ steps.meta.outputs.tags }}
        run: |
          images=""
          for tag in ${TAGS}; do
            images+="${tag}@${DIGEST} "
          done
          cosign sign --yes ${images}

      - name: Generate SBOM
        uses: anchore/sbom-action@17ae1740179002c89186b61233e0f892c3118b11 # v0.22.2
        with:
          image: ${{ env[matrix.image_key] }}:${{ steps.meta.outputs.version }}
          artifact-name: sbom-${{ matrix.name }}-${{ steps.meta.outputs.version }}.spdx.json
          output-file: ./sbom-${{ matrix.name }}.spdx.json
          upload-release-assets: false

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: sbom-${{ matrix.name }}
          path: ./sbom-${{ matrix.name }}.spdx.json
          retention-days: 90

  # ===========================================================================
  # Tag-only Jobs: Trivy Security Scan
  # ===========================================================================

  trivy-scan:
    name: Trivy Security Scan
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [docker-build-push]
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: read
      security-events: write
    strategy:
      matrix:
        include:
          - name: operator
            image_key: DOCKER_IMAGE_OPERATOR
          - name: ctl
            image_key: DOCKER_IMAGE_CTL
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Login to GitHub Container Registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          registry: ${{ env.DOCKER_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@97e0b3872f55f89b95b2f65b3dbab56962816478 # v0.34.0
        with:
          image-ref: '${{ env[matrix.image_key] }}:latest'
          format: 'sarif'
          output: 'trivy-${{ matrix.name }}-results.sarif'
          severity: 'CRITICAL,HIGH'
          vuln-type: 'os,library'

      - name: Upload Trivy scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@0d579ffd059c29b07949a3cce3983f0780820c98 # v4.32.5
        with:
          sarif_file: 'trivy-${{ matrix.name }}-results.sarif'

      - name: Run Trivy vulnerability scanner (table output)
        uses: aquasecurity/trivy-action@97e0b3872f55f89b95b2f65b3dbab56962816478 # v0.34.0
        with:
          image-ref: '${{ env[matrix.image_key] }}:latest'
          format: 'table'
          severity: 'CRITICAL,HIGH'
          vuln-type: 'os,library'
          exit-code: '1'

      - name: Upload Trivy results artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        if: always()
        with:
          name: trivy-${{ matrix.name }}-results
          path: trivy-${{ matrix.name }}-results.sarif
          retention-days: 30

  # ===========================================================================
  # Tag-only Jobs: Helm Package
  # ===========================================================================

  helm-package:
    name: Helm Package
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [lint, govulncheck, unit-tests, functional-tests]
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Helm
        uses: azure/setup-helm@1a275c3b69536ee54be43f2070a358922e12c8d4 # v4
        with:
          version: 'v3.14.0'

      - name: Helm lint
        run: helm lint ${{ env.HELM_CHART_PATH }}

      - name: Helm package
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          helm package ${{ env.HELM_CHART_PATH }} --version "${VERSION}" --app-version "${VERSION}"

      - name: Upload Helm chart artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: helm-chart
          path: cloudberry-operator-*.tgz
          retention-days: 30
