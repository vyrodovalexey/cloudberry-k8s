name: CI

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  GO_VERSION: '1.26.3'
  GOLANGCI_LINT_VERSION: 'v2.12.2'
  DOCKER_REGISTRY: ghcr.io
  DOCKER_IMAGE_OPERATOR: ghcr.io/${{ github.repository }}-operator
  DOCKER_IMAGE_CTL: ghcr.io/${{ github.repository }}-ctl
  HELM_CHART_PATH: deploy/helm/cloudberry-operator

jobs:
  # ===========================================================================
  # Parallel: Lint, Vulnerability Check, Unit Tests
  # ===========================================================================

  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-go@7a3fe6cf4cb3a834922a1244abfce67bcef6a0c5 # v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - uses: golangci/golangci-lint-action@1e7e51e771db61008b38414a730f564565cf7c20 # v9.2.0
        with:
          version: ${{ env.GOLANGCI_LINT_VERSION }}
          args: --timeout=5m

  govulncheck:
    name: Vulnerability Check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-go@7a3fe6cf4cb3a834922a1244abfce67bcef6a0c5 # v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - run: go install golang.org/x/vuln/cmd/govulncheck@latest
      - run: govulncheck ./...

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-go@7a3fe6cf4cb3a834922a1244abfce67bcef6a0c5 # v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: Run unit tests with coverage
        run: |
          mkdir -p coverage
          go test -race -coverprofile=coverage/unit.out -covermode=atomic \
            ./internal/... ./cmd/... ./api/...
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: coverage-unit
          path: coverage/unit.out
          retention-days: 7

  # ===========================================================================
  # Combined: Functional + Integration + E2E Tests (single service set)
  # ===========================================================================

  service-tests:
    name: Functional / Integration / E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    services:
      vault:
        image: hashicorp/vault:1.17
        ports:
          - 8200:8200
        env:
          VAULT_DEV_ROOT_TOKEN_ID: myroot
          VAULT_DEV_LISTEN_ADDRESS: 0.0.0.0:8200
          SKIP_SETCAP: "true"
        options: >-
          --cap-add IPC_LOCK
          --health-cmd "vault status"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
          --health-start-period 10s

      keycloakdb:
        image: postgres:16
        env:
          POSTGRES_DB: keycloak
          POSTGRES_USER: keycloak
          POSTGRES_PASSWORD: password
        options: >-
          --health-cmd "pg_isready -U keycloak"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
          --health-start-period 10s

      keycloak:
        image: quay.io/keycloak/keycloak:26.5
        env:
          KC_DB: postgres
          KC_DB_URL: jdbc:postgresql://keycloakdb:5432/keycloak
          KC_DB_USERNAME: keycloak
          KC_DB_PASSWORD: password
          KC_HTTP_PORT: 8090
          KC_HOSTNAME_STRICT: "false"
          KC_HOSTNAME_STRICT_HTTPS: "false"
          KC_HTTP_ENABLED: "true"
          KC_PROXY_HEADERS: xforwarded
          KC_FEATURES: token-exchange,admin-fine-grained-authz
          KC_SPI_REALM_DEFAULT_SSL_REQUIRED: none
          KC_LOG_LEVEL: info
          KC_METRICS_ENABLED: "true"
          KC_HEALTH_ENABLED: "true"
          KEYCLOAK_ADMIN: admin
          KEYCLOAK_ADMIN_PASSWORD: admin
        ports:
          - 8090:8090
          - 8091:9000

      minio:
        image: minio/minio:RELEASE.2024-11-07T00-52-20Z
        ports:
          - 9000:9000
          - 9001:9001
        env:
          MINIO_ROOT_USER: minioadmin
          MINIO_ROOT_PASSWORD: minioadmin
        options: >-
          --health-cmd "curl -f http://localhost:9000/minio/health/live || exit 1"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
          --health-start-period 5s

      kafka:
        image: apache/kafka:3.9.0
        ports:
          - 9094:9094
        env:
          KAFKA_NODE_ID: 1
          KAFKA_PROCESS_ROLES: broker,controller
          KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
          KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093,EXTERNAL://:9094
          KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,EXTERNAL://127.0.0.1:9094
          KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT
          KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
          KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
          CLUSTER_ID: cloudberry-ci-kafka-cluster
        options: >-
          --health-cmd "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 15
          --health-start-period 30s

      rabbitmq:
        image: rabbitmq:3.13-management
        ports:
          - 5672:5672
          - 15672:15672
        env:
          RABBITMQ_DEFAULT_USER: guest
          RABBITMQ_DEFAULT_PASS: guest
        options: >-
          --health-cmd "rabbitmq-diagnostics -q ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
          --health-start-period 15s

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-go@7a3fe6cf4cb3a834922a1244abfce67bcef6a0c5 # v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Wait for services
        run: |
          echo "--- Vault ---"
          for i in {1..30}; do
            curl -sf http://127.0.0.1:8200/v1/sys/health > /dev/null 2>&1 && echo "Vault ready" && break
            echo "  attempt $i …"; sleep 2
          done

          echo "--- Keycloak ---"
          for i in {1..60}; do
            curl -sf http://127.0.0.1:8091/health/ready > /dev/null 2>&1 && echo "Keycloak ready" && break
            curl -sf http://127.0.0.1:8090/realms/master > /dev/null 2>&1 && echo "Keycloak ready (realm)" && break
            echo "  attempt $i …"; sleep 5
          done

          echo "--- MinIO ---"
          for i in {1..30}; do
            curl -sf http://127.0.0.1:9000/minio/health/live > /dev/null 2>&1 && echo "MinIO ready" && break
            echo "  attempt $i …"; sleep 2
          done

          echo "--- Kafka ---"
          for i in {1..30}; do
            echo "" | nc -w 3 127.0.0.1 9094 > /dev/null 2>&1 && echo "Kafka ready" && break
            echo "  attempt $i …"; sleep 3
          done

          echo "--- RabbitMQ ---"
          for i in {1..30}; do
            curl -sf http://127.0.0.1:15672/api/health/checks/alarms -u guest:guest > /dev/null 2>&1 && echo "RabbitMQ ready" && break
            echo "  attempt $i …"; sleep 3
          done

      - name: Setup Vault
        env:
          VAULT_ADDR: http://127.0.0.1:8200
          VAULT_TOKEN: myroot
        run: bash test/docker-compose/scripts/setup-vault.sh --ci

      - name: Setup Keycloak
        env:
          KEYCLOAK_ADDR: http://127.0.0.1:8090
        run: bash test/docker-compose/scripts/setup-keycloak.sh

      - name: Setup MinIO
        env:
          MINIO_ADDR: http://127.0.0.1:9000
        run: bash test/docker-compose/scripts/setup-minio.sh --ci

      - name: Setup Kafka
        env:
          KAFKA_BROKERS: 127.0.0.1:9094
        run: bash test/docker-compose/scripts/setup-kafka.sh --ci

      - name: Setup RabbitMQ
        env:
          RABBITMQ_ADDR: http://127.0.0.1:15672
        run: bash test/docker-compose/scripts/setup-rabbitmq.sh --ci

      - name: Run functional tests
        env: &test-env
          VAULT_ADDR: http://127.0.0.1:8200
          VAULT_TOKEN: myroot
          KEYCLOAK_ADDR: http://127.0.0.1:8090
          KEYCLOAK_ADMIN: admin
          KEYCLOAK_ADMIN_PASSWORD: admin
          MINIO_ADDR: http://127.0.0.1:9000
          MINIO_ACCESS_KEY: minioadmin
          MINIO_SECRET_KEY: minioadmin
          KAFKA_BROKERS: 127.0.0.1:9094
          RABBITMQ_ADDR: amqp://guest:guest@127.0.0.1:5672/
          SKIP_DOCKER_COMPOSE: "true"
        run: |
          mkdir -p coverage
          go test -race -coverprofile=coverage/functional.out -covermode=atomic \
            -tags=functional -timeout 5m ./test/functional/...

      - name: Run integration tests
        env: *test-env
        run: |
          go test -race -coverprofile=coverage/integration.out -covermode=atomic \
            -tags=integration -v -timeout 10m ./test/integration/...

      - name: Run e2e tests
        env: *test-env
        run: |
          go test -race -coverprofile=coverage/e2e.out -covermode=atomic \
            -tags=e2e -v -timeout 15m ./test/e2e/...

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: coverage-service-tests
          path: coverage/
          retention-days: 7

  # ===========================================================================
  # Build (PR only)
  # ===========================================================================

  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [lint, govulncheck, unit-tests]
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-go@7a3fe6cf4cb3a834922a1244abfce67bcef6a0c5 # v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: Build binaries
        run: |
          mkdir -p bin
          CGO_ENABLED=0 go build -ldflags="-s -w" -o bin/cloudberry-operator ./cmd/operator/
          CGO_ENABLED=0 go build -ldflags="-s -w" -o bin/cloudberry-ctl ./cmd/cloudberry-ctl/
          ls -la ./bin/
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: binaries
          path: bin/
          retention-days: 7

  # ===========================================================================
  # Docker Build (PR only - no push)
  # ===========================================================================

  docker-build:
    name: Docker Build (${{ matrix.name }})
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [build]
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
    strategy:
      matrix:
        include:
          - name: operator
            dockerfile: Dockerfile
            image_env: DOCKER_IMAGE_OPERATOR
          - name: ctl
            dockerfile: Dockerfile.ctl
            image_env: DOCKER_IMAGE_CTL
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3
      - id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        with:
          images: ${{ env[matrix.image_env] }}
          tags: |
            type=ref,event=pr
            type=sha,prefix=pr-
      - uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: ./${{ matrix.dockerfile }}
          push: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ===========================================================================
  # Helm Lint (PR)
  # ===========================================================================

  helm-lint:
    name: Helm Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [lint, govulncheck, unit-tests]
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: azure/setup-helm@1a275c3b69536ee54be43f2070a358922e12c8d4 # v4
        with:
          version: 'v3.14.0'
      - run: helm lint ${{ env.HELM_CHART_PATH }}
      - run: |
          helm template cloudberry-operator ${{ env.HELM_CHART_PATH }} \
            --set installCRDs=true > /dev/null
          echo "Template validation successful!"

  # ===========================================================================
  # Tag-only: Build & Release
  # ===========================================================================

  build-release:
    name: Build & Release
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [lint, govulncheck, unit-tests, service-tests]
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
      packages: write
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - uses: actions/setup-go@7a3fe6cf4cb3a834922a1244abfce67bcef6a0c5 # v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: Get version
        id: version
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
      - name: Build multi-platform binaries
        run: |
          mkdir -p bin
          BT=$(date -u '+%Y-%m-%d_%H:%M:%S')
          VER=${{ steps.version.outputs.version }}
          SHA=${{ github.sha }}
          for PAIR in linux/amd64 linux/arm64 darwin/amd64 darwin/arm64; do
            OS=${PAIR%/*}; ARCH=${PAIR#*/}
            for CMD in operator cloudberry-ctl; do
              BIN=cloudberry-${CMD}; [ "$CMD" = "operator" ] && BIN=cloudberry-operator
              echo "Building ${BIN} ${OS}/${ARCH}"
              CGO_ENABLED=0 GOOS=${OS} GOARCH=${ARCH} go build -trimpath \
                -ldflags="-s -w -X main.version=${VER} -X main.buildTime=${BT} -X main.gitCommit=${SHA}" \
                -o "bin/${BIN}-${OS}-${ARCH}" "./cmd/${CMD}/"
            done
          done
          cd bin && for f in cloudberry-*; do sha256sum "$f" > "${f}.sha256"; done
      - uses: softprops/action-gh-release@a06a81a03ee405af7f2048a818ed3f03bbf83c7b # v2
        with:
          name: Release ${{ steps.version.outputs.version }}
          draft: false
          prerelease: ${{ contains(steps.version.outputs.version, '-') }}
          generate_release_notes: true
          files: bin/cloudberry-*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: release-binaries
          path: bin/
          retention-days: 30

  # ===========================================================================
  # Tag-only: Docker Build & Push
  # ===========================================================================

  docker-build-push:
    name: Docker Push (${{ matrix.name }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [build-release]
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: read
      packages: write
      id-token: write
    strategy:
      matrix:
        include:
          - name: operator
            dockerfile: Dockerfile
            image_key: DOCKER_IMAGE_OPERATOR
          - name: ctl
            dockerfile: Dockerfile.ctl
            image_key: DOCKER_IMAGE_CTL
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3
      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3
      - uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          registry: ${{ env.DOCKER_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        with:
          images: ${{ env[matrix.image_key] }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=
            type=raw,value=latest
      - id: build
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: ./${{ matrix.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - uses: sigstore/cosign-installer@faadad0cce49287aee09b3a48701e75088a2c6ad # v3.7.0
      - name: Sign image
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
          TAGS: ${{ steps.meta.outputs.tags }}
        run: |
          images=""
          for tag in ${TAGS}; do images+="${tag}@${DIGEST} "; done
          cosign sign --yes ${images}

  # ===========================================================================
  # Tag-only: Trivy Scan
  # ===========================================================================

  trivy-scan:
    name: Trivy (${{ matrix.name }})
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [docker-build-push]
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: read
      security-events: write
    strategy:
      matrix:
        include:
          - name: operator
            image_key: DOCKER_IMAGE_OPERATOR
          - name: ctl
            image_key: DOCKER_IMAGE_CTL
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          registry: ${{ env.DOCKER_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: aquasecurity/trivy-action@97e0b3872f55f89b95b2f65b3dbab56962816478 # v0.34.0
        with:
          image-ref: '${{ env[matrix.image_key] }}:latest'
          format: 'sarif'
          output: 'trivy-${{ matrix.name }}.sarif'
          severity: 'CRITICAL,HIGH'
      - uses: github/codeql-action/upload-sarif@0d579ffd059c29b07949a3cce3983f0780820c98 # v4.32.5
        with:
          sarif_file: 'trivy-${{ matrix.name }}.sarif'
      - uses: aquasecurity/trivy-action@97e0b3872f55f89b95b2f65b3dbab56962816478 # v0.34.0
        with:
          image-ref: '${{ env[matrix.image_key] }}:latest'
          format: 'table'
          severity: 'CRITICAL,HIGH'
          exit-code: '1'

  # ===========================================================================
  # Tag-only: Helm Package
  # ===========================================================================

  helm-package:
    name: Helm Package
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [trivy-scan]
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: azure/setup-helm@1a275c3b69536ee54be43f2070a358922e12c8d4 # v4
        with:
          version: 'v3.14.0'
      - run: helm lint ${{ env.HELM_CHART_PATH }}
      - name: Package
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          helm package ${{ env.HELM_CHART_PATH }} --version "${VERSION}" --app-version "${VERSION}"
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: helm-chart
          path: cloudberry-operator-*.tgz
          retention-days: 30
