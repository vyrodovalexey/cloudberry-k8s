name: CI

on:
  push:
    tags:
      - 'v*'
  pull_request:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  GO_VERSION: '1.26.4'
  GOLANGCI_LINT_VERSION: 'v2.12.2'
  DOCKER_REGISTRY: ghcr.io
  DOCKER_IMAGE_OPERATOR: ghcr.io/${{ github.repository }}-operator
  DOCKER_IMAGE_CTL: ghcr.io/${{ github.repository }}-ctl
  DOCKER_IMAGE_CLOUDBERRY: ghcr.io/${{ github.repository }}-cloudberry
  DOCKER_IMAGE_QUERY_EXPORTER: ghcr.io/${{ github.repository }}-query-exporter
  DOCKER_IMAGE_BACKUP: ghcr.io/${{ github.repository }}-backup
  DOCKER_IMAGE_GPFDIST: ghcr.io/${{ github.repository }}-gpfdist
  DOCKER_IMAGE_OFFICIAL_PXF: ghcr.io/${{ github.repository }}-official-pxf
  HELM_CHART_PATH: deploy/helm/cloudberry-operator

jobs:
  # ===========================================================================
  # Parallel: Lint, Vulnerability Check, Unit Tests
  # ===========================================================================

  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-go@7a3fe6cf4cb3a834922a1244abfce67bcef6a0c5 # v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - uses: golangci/golangci-lint-action@1e7e51e771db61008b38414a730f564565cf7c20 # v9.2.0
        with:
          version: ${{ env.GOLANGCI_LINT_VERSION }}
          args: --timeout=5m
      - name: Validate Grafana dashboards
        run: |
          for f in monitoring/grafana/*.json; do
            jq empty "$f" || { echo "Invalid JSON: $f"; exit 1; }
            uid=$(jq -r '.uid // empty' "$f")
            title=$(jq -r '.title // empty' "$f")
            [ -n "$uid" ] || { echo "Missing uid in $f"; exit 1; }
            [ -n "$title" ] || { echo "Missing title in $f"; exit 1; }
            echo "✓ $f (uid=$uid, title=$title)"
          done

  govulncheck:
    name: Vulnerability Check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-go@7a3fe6cf4cb3a834922a1244abfce67bcef6a0c5 # v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - run: |
          go get golang.org/x/vuln/cmd/govulncheck@v1.1.4
          go install golang.org/x/vuln/cmd/govulncheck@v1.1.4
          govulncheck ./...

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-go@7a3fe6cf4cb3a834922a1244abfce67bcef6a0c5 # v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: Run unit tests with coverage
        run: |
          mkdir -p coverage
          go test -race -coverprofile=coverage/unit.out -covermode=atomic \
            ./internal/... ./cmd/... ./api/...
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: coverage-unit
          path: coverage/unit.out
          retention-days: 7

  # ===========================================================================
  # Combined: Functional + Integration + E2E Tests (single service set)
  # ===========================================================================

  service-tests:
    name: Functional / Integration / E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    services:
      vault:
        image: hashicorp/vault:1.17
        ports:
          - 8200:8200
        env:
          VAULT_DEV_ROOT_TOKEN_ID: myroot
          VAULT_DEV_LISTEN_ADDRESS: 0.0.0.0:8200

      # NOTE: Keycloak (+ keycloakdb) and MinIO are NOT declared as services
      # here. GitHub Actions service containers do NOT support the `command:`
      # key (only image/env/ports/volumes/options/credentials). Keycloak
      # requires `start-dev` and MinIO requires `server /data ...` — without
      # these commands the containers print help and exit immediately.
      # They are started via docker compose in the step below, which correctly
      # passes the command and keeps CI identical to the local test environment.

      kafka:
        image: apache/kafka:3.9.0
        ports:
          - 9094:9094
        env:
          KAFKA_NODE_ID: 1
          KAFKA_PROCESS_ROLES: broker,controller
          KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
          KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093,EXTERNAL://:9094
          KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,EXTERNAL://127.0.0.1:9094
          KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT
          KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
          KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
          CLUSTER_ID: cloudberry-ci-kafka-cluster
        options: >-
          --health-cmd "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 15
          --health-start-period 30s

      rabbitmq:
        image: rabbitmq:3.13-management
        ports:
          - 5672:5672
          - 15672:15672
        env:
          RABBITMQ_DEFAULT_USER: guest
          RABBITMQ_DEFAULT_PASS: guest
        options: >-
          --health-cmd "rabbitmq-diagnostics -q ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
          --health-start-period 15s

      victorialogs:
        image: victoriametrics/victoria-logs:v1.3.2-victorialogs
        ports:
          - 9428:9428

      # NOTE: HDFS + Hive (namenode, datanode, hive-metastore-db, hive-metastore,
      # hiveserver2) are also NOT declared as `services:` here. GitHub Actions
      # service containers start BEFORE the repo is checked out, so the XML
      # config files under test/docker-compose/{hadoop,hive} cannot be
      # bind-mounted. Instead the Hive/HDFS stack is started from the project's
      # own docker-compose file in the step below, after checkout — keeping CI
      # identical to the local test environment.

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-go@7a3fe6cf4cb3a834922a1244abfce67bcef6a0c5 # v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      # Keycloak, MinIO, and HDFS/Hive are started via docker compose because
      # they need a custom `command:` or bind-mounted config files — neither of
      # which GitHub Actions `services:` supports. Runs in the background while
      # the inline `services:` (vault, kafka, rabbitmq, victorialogs) warm up.
      - name: Start compose services (Keycloak, MinIO, Hive, HDFS, MySQL, PgSource, HBase)
        run: |
          docker compose -f test/docker-compose/docker-compose.yml up -d \
            keycloakdb keycloak_web minio \
            namenode datanode hive-metastore-db hive-metastore hiveserver2 \
            mysql pgsource hbase
          echo "Compose containers launched; readiness checked in the next step."

      - name: Wait for services
        run: |
          echo "--- Vault ---"
          for i in {1..30}; do
            curl -sf http://127.0.0.1:8200/v1/sys/health > /dev/null 2>&1 && echo "Vault ready" && break
            echo "  attempt $i …"; sleep 2
          done

          echo "--- Keycloak ---"
          for i in {1..60}; do
            curl -sf http://127.0.0.1:8091/health/ready > /dev/null 2>&1 && echo "Keycloak ready" && break
            curl -sf http://127.0.0.1:8090/realms/master > /dev/null 2>&1 && echo "Keycloak ready (realm)" && break
            echo "  attempt $i …"; sleep 5
          done

          echo "--- MinIO ---"
          for i in {1..30}; do
            curl -sf http://127.0.0.1:9000/minio/health/live > /dev/null 2>&1 && echo "MinIO ready" && break
            echo "  attempt $i …"; sleep 2
          done

          echo "--- Kafka ---"
          for i in {1..30}; do
            echo "" | nc -w 3 127.0.0.1 9094 > /dev/null 2>&1 && echo "Kafka ready" && break
            echo "  attempt $i …"; sleep 3
          done

          echo "--- RabbitMQ ---"
          for i in {1..30}; do
            curl -sf http://127.0.0.1:15672/api/health/checks/alarms -u guest:guest > /dev/null 2>&1 && echo "RabbitMQ ready" && break
            echo "  attempt $i …"; sleep 3
          done

          echo "--- VictoriaLogs ---"
          for i in {1..30}; do
            curl -sf http://127.0.0.1:9428/health > /dev/null 2>&1 && echo "VictoriaLogs ready" && break
            echo "  attempt $i …"; sleep 2
          done

          echo "--- HDFS NameNode (WebHDFS) ---"
          for i in {1..60}; do
            curl -sf "http://127.0.0.1:9870/webhdfs/v1/?op=LISTSTATUS" > /dev/null 2>&1 && echo "HDFS NameNode ready" && break
            echo "  attempt $i …"; sleep 3
          done

          echo "--- Hive Metastore (Thrift 9083) ---"
          for i in {1..60}; do
            nc -z -w 3 127.0.0.1 9083 > /dev/null 2>&1 && echo "Hive Metastore ready" && break
            echo "  attempt $i …"; sleep 3
          done

          echo "--- HiveServer2 (JDBC 10000) ---"
          for i in {1..60}; do
            nc -z -w 3 127.0.0.1 10000 > /dev/null 2>&1 && echo "HiveServer2 ready" && break
            echo "  attempt $i …"; sleep 3
          done

          echo "--- MySQL (3306) ---"
          for i in {1..60}; do
            nc -z -w 3 127.0.0.1 3306 > /dev/null 2>&1 && echo "MySQL ready" && break
            echo "  attempt $i …"; sleep 3
          done

          echo "--- PostgreSQL source (5432) ---"
          for i in {1..30}; do
            nc -z -w 3 127.0.0.1 5432 > /dev/null 2>&1 && echo "PgSource ready" && break
            echo "  attempt $i …"; sleep 2
          done

          echo "--- HBase (ZooKeeper 2181) ---"
          for i in {1..60}; do
            echo ruok | nc -w 3 127.0.0.1 2181 2>/dev/null | grep -q imok && echo "HBase ZooKeeper ready" && break
            echo "  attempt $i …"; sleep 3
          done

      - name: Setup Vault
        env:
          VAULT_ADDR: http://127.0.0.1:8200
          VAULT_TOKEN: myroot
        run: bash test/docker-compose/scripts/setup-vault.sh --ci

      - name: Setup Keycloak
        env:
          KEYCLOAK_ADDR: http://127.0.0.1:8090
        run: bash test/docker-compose/scripts/setup-keycloak.sh --ci

      - name: Setup MinIO
        env:
          MINIO_ADDR: http://127.0.0.1:9000
        run: bash test/docker-compose/scripts/setup-minio.sh --ci

      - name: Setup Kafka
        env:
          KAFKA_BROKERS: 127.0.0.1:9094
        run: bash test/docker-compose/scripts/setup-kafka.sh --ci

      - name: Setup RabbitMQ
        env:
          RABBITMQ_ADDR: http://127.0.0.1:15672
        run: bash test/docker-compose/scripts/setup-rabbitmq.sh --ci

      - name: Setup Hive + HDFS
        env:
          WEBHDFS_ADDR: http://127.0.0.1:9870
          METASTORE_PORT: "9083"
        run: bash test/docker-compose/scripts/setup-hive-hdfs.sh

      - name: Setup JDBC sources
        env:
          MYSQL_HOST: 127.0.0.1
          MYSQL_PORT: "3306"
          PG_HOST: 127.0.0.1
          PG_PORT: "5432"
        run: bash test/docker-compose/scripts/setup-jdbc-sources.sh --ci

      - name: Setup HBase
        run: bash test/docker-compose/scripts/setup-hbase.sh

      - name: Generate object-store samples
        env:
          MINIO_ADDR: http://127.0.0.1:9000
        run: bash test/docker-compose/scripts/gen-objstore-samples.sh --no-docker

      - name: Generate Hadoop samples
        env:
          WEBHDFS_ADDR: http://127.0.0.1:9870
        run: bash test/docker-compose/scripts/gen-hadoop-samples.sh --ci

      - name: Generate pushdown samples
        env:
          MINIO_ADDR: http://127.0.0.1:9000
        run: bash test/docker-compose/scripts/gen-pushdown-samples.sh --no-docker

      - name: Generate export targets (Scenario 99)
        env:
          MINIO_ADDR: http://127.0.0.1:9000
          WEBHDFS_ADDR: http://127.0.0.1:9870
          PG_CONTAINER: pgsource
        run: bash test/docker-compose/scripts/gen-export-targets.sh

      - name: Generate gpload CSV samples (Scenario 101)
        run: bash test/docker-compose/scripts/gen-gpload-csv.sh

      - name: Generate kafka-cdc samples (Scenario 102)
        env:
          KAFKA_BROKERS: 127.0.0.1:9094
        run: bash test/docker-compose/scripts/gen-kafka-cdc.sh

      - name: Run functional tests
        env: &test-env
          VAULT_ADDR: http://127.0.0.1:8200
          VAULT_TOKEN: myroot
          KEYCLOAK_ADDR: http://127.0.0.1:8090
          KEYCLOAK_ADMIN: admin
          KEYCLOAK_ADMIN_PASSWORD: admin
          MINIO_ADDR: http://127.0.0.1:9000
          MINIO_ACCESS_KEY: minioadmin
          MINIO_SECRET_KEY: minioadmin
          KAFKA_BROKERS: 127.0.0.1:9094
          RABBITMQ_ADDR: amqp://guest:guest@127.0.0.1:5672/
          WEBHDFS_ADDR: http://127.0.0.1:9870
          HDFS_NAMENODE: hdfs://127.0.0.1:8020
          HIVE_METASTORE_URIS: thrift://127.0.0.1:9083
          HIVESERVER2_JDBC: jdbc:hive2://127.0.0.1:10000
          MYSQL_HOST: 127.0.0.1
          MYSQL_PORT: "3306"
          PG_HOST: 127.0.0.1
          PG_PORT: "5432"
          HBASE_ZOOKEEPER_QUORUM: 127.0.0.1:2181
          SKIP_DOCKER_COMPOSE: "true"
        run: |
          mkdir -p coverage
          go test -race -coverprofile=coverage/functional.out -covermode=atomic \
            -tags=functional -timeout 5m ./test/functional/...

      - name: Run integration tests
        env: *test-env
        run: |
          go test -race -coverprofile=coverage/integration.out -covermode=atomic \
            -tags=integration -v -timeout 10m ./test/integration/...

      - name: Run e2e tests
        env: *test-env
        run: |
          go test -race -coverprofile=coverage/e2e.out -covermode=atomic \
            -tags=e2e -v -timeout 15m ./test/e2e/...

      - name: Compose services diagnostics (on failure)
        if: failure()
        run: |
          echo "=== compose ps ==="
          docker compose -f test/docker-compose/docker-compose.yml ps || true
          for c in keycloakdb keycloak_web minio namenode datanode hive-metastore-db hive-metastore hiveserver2 mysql pgsource hbase; do
            echo "=== logs: $c ==="
            docker logs --tail 80 "$c" 2>&1 || true
          done

      - name: Tear down compose services
        if: always()
        run: |
          docker compose -f test/docker-compose/docker-compose.yml down -v \
            keycloakdb keycloak_web minio \
            namenode datanode hive-metastore-db hive-metastore hiveserver2 \
            mysql pgsource hbase || true

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: coverage-service-tests
          path: coverage/
          retention-days: 7

  # ===========================================================================
  # Sequential Jobs: SonarCloud, Build, Docker
  # ===========================================================================

  sonarcloud:
    name: SonarCloud Analysis
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [lint, govulncheck, unit-tests, service-tests]
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0  # Required for SonarCloud

      - name: Download unit coverage
        uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16 # v7.0.0
        with:
          name: coverage-unit
          path: coverage


      - name: Download functional/integration/e2e coverage
        uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16 # v7.0.0
        with:
          name: coverage-service-tests
          path: coverage

      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@a31c9398be7ace6bbfaf30c0bd5d415f843d45e9 # v7
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            "-Dsonar.projectKey=${{ github.repository_owner }}_${{ github.event.repository.name }}"
            "-Dsonar.organization=${{ github.repository_owner }}"
            "-Dsonar.go.coverage.reportPaths=coverage/unit.out,coverage/functional.out,coverage/integration.out,coverage/e2e.out"
            "-Dsonar.sources=."
            "-Dsonar.exclusions=**/vendor/**,**/test/**,**/*_test.go,**/mocks/**,**/testdata/**,**/bin/**,**/coverage/**,**/helm/**,**/api/**,**/proto/**"
            "-Dsonar.tests=."
            "-Dsonar.test.inclusions=**/*_test.go"
            "-Dsonar.qualitygate.wait=${{ !startsWith(github.ref, 'refs/tags/') }}"




  # ===========================================================================
  # Build (PR only)
  # ===========================================================================

  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [sonarcloud]
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-go@7a3fe6cf4cb3a834922a1244abfce67bcef6a0c5 # v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: Build binaries
        run: |
          mkdir -p bin
          CGO_ENABLED=0 go build -ldflags="-s -w" -o bin/cloudberry-operator ./cmd/operator/
          CGO_ENABLED=0 go build -ldflags="-s -w" -o bin/cloudberry-ctl ./cmd/cloudberry-ctl/
          CGO_ENABLED=0 go build -ldflags="-s -w" -o bin/cloudberry-query-exporter ./cmd/cloudberry-query-exporter/
          ls -la ./bin/
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: binaries
          path: bin/
          retention-days: 7

  # ===========================================================================
  # Docker Build (PR only - no push)
  # ===========================================================================

  docker-build:
    name: Docker Build (${{ matrix.name }})
    runs-on: ubuntu-latest
    timeout-minutes: 60
    needs: [build]
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
    strategy:
      matrix:
        include:
          - name: operator
            dockerfile: Dockerfile.operator
            image_env: DOCKER_IMAGE_OPERATOR
          - name: ctl
            dockerfile: Dockerfile.ctl
            image_env: DOCKER_IMAGE_CTL
          - name: query-exporter
            dockerfile: Dockerfile.cloudberry-query-exporter
            image_env: DOCKER_IMAGE_QUERY_EXPORTER
          # backup compiles apache/cloudberry-backup from source (slow); built on PRs and releases.
          - name: backup
            dockerfile: Dockerfile.cloudberry-backup
            image_env: DOCKER_IMAGE_BACKUP
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3
      - id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        with:
          images: ${{ env[matrix.image_env] }}
          tags: |
            type=ref,event=pr
            type=sha,prefix=pr-
      - uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: ./${{ matrix.dockerfile }}
          push: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max


  # ===========================================================================
  # Docker Build — Cloudberry chain (PR only - no push)
  # ===========================================================================
  # The cloudberry images have a dependency chain that requires sequential
  # builds in a single runner so bare-tag FROM references resolve locally:
  #   cloudberry-pxf:2.1.0           (standalone)
  #   cloudberry-official:2.1.0      (standalone)
  #   cloudberry-official-pxf:2.1.0  (FROM cloudberry-pxf + cloudberry-official)
  #   cloudberry-gpfdist:2.1.0       (FROM cloudberry-official-pxf)

  docker-build-cloudberry-chain:
    name: Docker Build (cloudberry chain)
    runs-on: ubuntu-latest
    timeout-minutes: 120
    needs: [build]
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3
        with:
          driver: docker
      # Step a: Build cloudberry-pxf (standalone, amd64)
      - name: Build cloudberry-pxf
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: ./Dockerfile.cloudberry-pxf
          push: false
          load: true
          tags: cloudberry-pxf:2.1.0
      # Step b: Build cloudberry-official (standalone, amd64)
      - name: Build cloudberry-official
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: ./Dockerfile.cloudberry-official
          push: false
          load: true
          tags: cloudberry-official:2.1.0
      # Step c: Build cloudberry-official-pxf (depends on pxf + official)
      - name: Build cloudberry-official-pxf
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: ./Dockerfile.cloudberry-official-pxf
          push: false
          load: true
          tags: cloudberry-official-pxf:2.1.0
          build-args: |
            CB_PXF_IMAGE=cloudberry-pxf:2.1.0
            CB_OFFICIAL_IMAGE=cloudberry-official:2.1.0
      # Step d: Build cloudberry-gpfdist (depends on official-pxf)
      - name: Build cloudberry-gpfdist
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: ./Dockerfile.cloudberry-gpfdist
          push: false
          load: true
          tags: cloudberry-gpfdist:2.1.0
          build-args: |
            CB_OFFICIAL_PXF_IMAGE=cloudberry-official-pxf:2.1.0

  # ===========================================================================
  # Helm Chart Testing (PR - Dry Run)
  # ===========================================================================

  helm-test-pr:
    name: Helm Chart Test (PR)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Helm
        uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5.0.0
        with:
          version: 'v3.14.0'

      - name: Create kind cluster
        uses: helm/kind-action@ef37e7f390d99f746eb8b610417061a60e82a6cc # v1.13.0
        with:
          cluster_name: helm-test
          wait: 120s

      - name: Helm lint
        run: helm lint ${{ env.HELM_CHART_PATH }}

      - name: Helm template validation
        run: |
          helm template ${{ env.HELM_CHART_PATH }} \
            --set installCRDs=true > /dev/null
          echo "Template validation successful!"

      - name: Helm dry-run install
        run: |
          echo "==> Running Helm dry-run install..."
          helm install --dry-run --debug cloudberry-operator ${{ env.HELM_CHART_PATH }} \
            --set installCRDs=true


      - name: Install Prometheus Operator CRDs
        run: |
          echo "==> Installing Prometheus Operator CRDs for ServiceMonitor support..."
          kubectl apply -f https://raw.githubusercontent.com/prometheus-operator/prometheus-operator/v0.71.0/example/prometheus-operator-crd/monitoring.coreos.com_servicemonitors.yaml

      - name: Lint monitoring charts
        run: |
          echo "==> Linting test monitoring charts..."
          helm lint test/monitoring/otel-collector
          helm lint test/monitoring/vmagent
          helm lint test/monitoring/vector
          helm lint test/monitoring/node-exporter
          helm lint test/monitoring/kube-state-metrics

      - name: Validate monitoring chart templates
        run: |
          echo "==> Validating monitoring chart templates..."
          helm template otel-collector test/monitoring/otel-collector > /dev/null
          helm template vmagent test/monitoring/vmagent > /dev/null
          helm template vector test/monitoring/vector > /dev/null
          helm template node-exporter test/monitoring/node-exporter > /dev/null
          helm template kube-state-metrics test/monitoring/kube-state-metrics > /dev/null
          echo "Monitoring chart template validation successful!"

      - name: Dry-run install monitoring charts
        run: |
          echo "==> Running Helm dry-run for monitoring charts..."
          helm install --dry-run --debug otel-collector test/monitoring/otel-collector
          helm install --dry-run --debug vmagent test/monitoring/vmagent
          helm install --dry-run --debug vector test/monitoring/vector
          helm install --dry-run --debug node-exporter test/monitoring/node-exporter
          helm install --dry-run --debug kube-state-metrics test/monitoring/kube-state-metrics

      - name: Validate monitoring chart Kubernetes manifests
        run: |
          echo "==> Validating monitoring chart Kubernetes manifests..."
          helm template otel-collector test/monitoring/otel-collector | kubectl apply --dry-run=client -f -
          helm template vmagent test/monitoring/vmagent | kubectl apply --dry-run=client -f -
          helm template vector test/monitoring/vector | kubectl apply --dry-run=client -f -
          helm template node-exporter test/monitoring/node-exporter | kubectl apply --dry-run=client -f -
          helm template kube-state-metrics test/monitoring/kube-state-metrics | kubectl apply --dry-run=client -f -
          echo "Monitoring chart Kubernetes manifest validation successful!"


  # ===========================================================================
  # Tag-only: Build & Release
  # ===========================================================================

  build-release:
    name: Build & Release
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [sonarcloud]
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
      packages: write
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - uses: actions/setup-go@7a3fe6cf4cb3a834922a1244abfce67bcef6a0c5 # v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: Get version
        id: version
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
      - name: Build multi-platform binaries
        run: |
          mkdir -p bin
          BT=$(date -u '+%Y-%m-%d_%H:%M:%S')
          VER=${{ steps.version.outputs.version }}
          SHA=${{ github.sha }}
          for PAIR in linux/amd64 linux/arm64 darwin/amd64 darwin/arm64; do
            OS=${PAIR%/*}; ARCH=${PAIR#*/}
            for CMD in operator cloudberry-ctl cloudberry-query-exporter; do
              case "$CMD" in
                operator) BIN=cloudberry-operator ;;
                *)        BIN=$CMD ;;
              esac
              echo "Building ${BIN} ${OS}/${ARCH}"
              CGO_ENABLED=0 GOOS=${OS} GOARCH=${ARCH} go build -trimpath \
                -ldflags="-s -w -X main.version=${VER} -X main.buildTime=${BT} -X main.gitCommit=${SHA}" \
                -o "bin/${BIN}-${OS}-${ARCH}" "./cmd/${CMD}/"
            done
          done
          cd bin && for f in cloudberry-*; do sha256sum "$f" > "${f}.sha256"; done
      - uses: softprops/action-gh-release@a06a81a03ee405af7f2048a818ed3f03bbf83c7b # v2
        with:
          name: Release ${{ steps.version.outputs.version }}
          draft: false
          prerelease: ${{ contains(steps.version.outputs.version, '-') }}
          generate_release_notes: true
          files: bin/cloudberry-*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: release-binaries
          path: bin/
          retention-days: 30

  # ===========================================================================
  # Tag-only: Docker Build & Push
  # ===========================================================================

  docker-build-push:
    name: Docker Push (${{ matrix.name }})
    runs-on: ubuntu-latest
    timeout-minutes: 60
    needs: [build-release]
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: read
      packages: write
      id-token: write
    strategy:
      matrix:
        include:
          - name: operator
            dockerfile: Dockerfile.operator
            image_key: DOCKER_IMAGE_OPERATOR
          - name: ctl
            dockerfile: Dockerfile.ctl
            image_key: DOCKER_IMAGE_CTL
          - name: query-exporter
            dockerfile: Dockerfile.cloudberry-query-exporter
            image_key: DOCKER_IMAGE_QUERY_EXPORTER
          - name: backup
            dockerfile: Dockerfile.cloudberry-backup
            image_key: DOCKER_IMAGE_BACKUP
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3
      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3
      - uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          registry: ${{ env.DOCKER_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        with:
          images: ${{ env[matrix.image_key] }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=
            type=raw,value=latest
      - id: build
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: ./${{ matrix.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - uses: sigstore/cosign-installer@faadad0cce49287aee09b3a48701e75088a2c6ad # v3.7.0
      - name: Sign image
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
          TAGS: ${{ steps.meta.outputs.tags }}
        run: |
          images=""
          # shellcheck disable=SC2086
          for tag in ${TAGS}; do images+="${tag}@${DIGEST} "; done
          # shellcheck disable=SC2086
          cosign sign --yes ${images}

  # ===========================================================================
  # Tag-only: Docker Build & Push — Cloudberry chain
  # ===========================================================================
  # Sequential chain build: pxf → official → official-pxf → gpfdist.
  # Intermediate images are loaded into the local daemon (load:true) so the
  # dependent FROM references resolve. Final images are pushed to GHCR.

  docker-build-push-cloudberry-chain:
    name: Docker Push (cloudberry chain)
    runs-on: ubuntu-latest
    timeout-minutes: 120
    needs: [build-release]
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3
        with:
          driver: docker
      - uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          registry: ${{ env.DOCKER_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Step a: Build cloudberry-pxf (standalone, amd64) — load only
      - name: Build cloudberry-pxf
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: ./Dockerfile.cloudberry-pxf
          push: false
          load: true
          tags: cloudberry-pxf:2.1.0

      # Step b: Build cloudberry-official (standalone, amd64) — load + push
      - id: meta-cloudberry
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        with:
          images: ${{ env.DOCKER_IMAGE_CLOUDBERRY }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=
            type=raw,value=latest
      - name: Build cloudberry-official
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: ./Dockerfile.cloudberry-official
          push: false
          load: true
          tags: |
            cloudberry-official:2.1.0
            ${{ steps.meta-cloudberry.outputs.tags }}
          labels: ${{ steps.meta-cloudberry.outputs.labels }}
      - name: Push cloudberry-official
        run: |
          tags="${{ steps.meta-cloudberry.outputs.tags }}"
          for tag in ${tags}; do
            docker push "${tag}"
          done

      # Step c: Build cloudberry-official-pxf (depends on pxf + official) — load + push
      - id: meta-official-pxf
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        with:
          images: ${{ env.DOCKER_IMAGE_OFFICIAL_PXF }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=
            type=raw,value=latest
      - name: Build cloudberry-official-pxf
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: ./Dockerfile.cloudberry-official-pxf
          push: false
          load: true
          tags: |
            cloudberry-official-pxf:2.1.0
            ${{ steps.meta-official-pxf.outputs.tags }}
          labels: ${{ steps.meta-official-pxf.outputs.labels }}
          build-args: |
            CB_PXF_IMAGE=cloudberry-pxf:2.1.0
            CB_OFFICIAL_IMAGE=cloudberry-official:2.1.0
      - name: Push cloudberry-official-pxf
        run: |
          tags="${{ steps.meta-official-pxf.outputs.tags }}"
          for tag in ${tags}; do
            docker push "${tag}"
          done

      # Step d: Build cloudberry-gpfdist (depends on official-pxf) — load + push
      - id: meta-gpfdist
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        with:
          images: ${{ env.DOCKER_IMAGE_GPFDIST }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=
            type=raw,value=latest
      - name: Build cloudberry-gpfdist
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: ./Dockerfile.cloudberry-gpfdist
          push: false
          load: true
          tags: |
            cloudberry-gpfdist:2.1.0
            ${{ steps.meta-gpfdist.outputs.tags }}
          labels: ${{ steps.meta-gpfdist.outputs.labels }}
          build-args: |
            CB_OFFICIAL_PXF_IMAGE=cloudberry-official-pxf:2.1.0
      - name: Push cloudberry-gpfdist
        run: |
          tags="${{ steps.meta-gpfdist.outputs.tags }}"
          for tag in ${tags}; do
            docker push "${tag}"
          done

      # Sign all pushed images
      - uses: sigstore/cosign-installer@faadad0cce49287aee09b3a48701e75088a2c6ad # v3.7.0
      - name: Sign cloudberry-official
        run: |
          digest=$(docker inspect --format='{{index .RepoDigests 0}}' "$(echo '${{ steps.meta-cloudberry.outputs.tags }}' | head -1)" 2>/dev/null || true)
          if [ -n "${digest}" ]; then
            cosign sign --yes "${digest}"
          fi
      - name: Sign cloudberry-official-pxf
        run: |
          digest=$(docker inspect --format='{{index .RepoDigests 0}}' "$(echo '${{ steps.meta-official-pxf.outputs.tags }}' | head -1)" 2>/dev/null || true)
          if [ -n "${digest}" ]; then
            cosign sign --yes "${digest}"
          fi
      - name: Sign cloudberry-gpfdist
        run: |
          digest=$(docker inspect --format='{{index .RepoDigests 0}}' "$(echo '${{ steps.meta-gpfdist.outputs.tags }}' | head -1)" 2>/dev/null || true)
          if [ -n "${digest}" ]; then
            cosign sign --yes "${digest}"
          fi

  # ===========================================================================
  # Tag-only: Trivy Scan
  # ===========================================================================

  trivy-scan:
    name: Trivy (${{ matrix.name }})
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [docker-build-push, docker-build-push-cloudberry-chain]
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: read
      security-events: write
    strategy:
      matrix:
        include:
          - name: operator
            image_key: DOCKER_IMAGE_OPERATOR
            skip_dirs: ''
          - name: ctl
            image_key: DOCKER_IMAGE_CTL
            skip_dirs: ''
          - name: cloudberry
            image_key: DOCKER_IMAGE_CLOUDBERRY
            skip_dirs: '/usr/local/cloudberry-db-2.1.0/bin'
          - name: query-exporter
            image_key: DOCKER_IMAGE_QUERY_EXPORTER
            skip_dirs: ''
          # backup: exclude /usr/local/bin from scanning. That directory holds the
          # statically-built Go binaries (gpbackup, gprestore, gpbackup_helper,
          # gpbackup_s3_plugin, gpbackman) whose vendored/stdlib dependencies are
          # scanned separately at source and produce noisy unfixable findings here.
          - name: backup
            image_key: DOCKER_IMAGE_BACKUP
            skip_dirs: '/usr/local/bin'
          # official-pxf: exclude the Cloudberry bin directory (same as cloudberry image).
          - name: official-pxf
            image_key: DOCKER_IMAGE_OFFICIAL_PXF
            skip_dirs: '/usr/local/cloudberry-db-2.1.0/bin'
          # gpfdist: exclude the Cloudberry bin directory (same as cloudberry image).
          - name: gpfdist
            image_key: DOCKER_IMAGE_GPFDIST
            skip_dirs: '/usr/local/cloudberry-db-2.1.0/bin'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          registry: ${{ env.DOCKER_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: aquasecurity/trivy-action@97e0b3872f55f89b95b2f65b3dbab56962816478 # v0.34.0
        with:
          image-ref: '${{ env[matrix.image_key] }}:latest'
          format: 'sarif'
          output: 'trivy-${{ matrix.name }}.sarif'
          severity: 'CRITICAL,HIGH'
          skip-dirs: ${{ matrix.skip_dirs }}
      - uses: github/codeql-action/upload-sarif@0d579ffd059c29b07949a3cce3983f0780820c98 # v4.32.5
        with:
          sarif_file: 'trivy-${{ matrix.name }}.sarif'
      - uses: aquasecurity/trivy-action@97e0b3872f55f89b95b2f65b3dbab56962816478 # v0.34.0
        with:
          image-ref: '${{ env[matrix.image_key] }}:latest'
          format: 'table'
          severity: 'CRITICAL,HIGH'
          exit-code: '1'
          skip-dirs: ${{ matrix.skip_dirs }}

  # ===========================================================================
  # Tag-only: Helm Package
  # ===========================================================================

  helm-package:
    name: Helm Package
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [trivy-scan]
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5.0.0
        with:
          version: 'v3.14.0'
      - run: helm lint ${{ env.HELM_CHART_PATH }}
      - name: Package
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          helm package ${{ env.HELM_CHART_PATH }} --version "${VERSION}" --app-version "${VERSION}"
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: helm-chart
          path: cloudberry-operator-*.tgz
          retention-days: 30
